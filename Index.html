let curTab='resumen'; let charts={};

const N=(v,d=0)=>v==null?'—':Number(v).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});
const P=v=>Number(v).toFixed(1)+'%';
const cagr=(e,s,y)=>((Math.pow(Math.max(e,0.01)/Math.max(s,0.01),1/y)-1)*100);
const cu=v=>v>0?'#16a34a':v>-15?'#d97706':'#dc2626';
const cbg=v=>v>0?'#f0fdf4':v>-15?'#fffbeb':'#fef2f2';
const cbd=v=>v>0?'1px solid #bbf7d0':v>-15?'1px solid #fde68a':'1px solid #fecaca';

function resetIS(){isSG=[...co.isD.sg];isEM=[...co.isD.em];isTR=[...co.isD.tr];isDI=[...co.isD.di];isCX=[...co.isD.cx];isWC=[...co.isD.wc];}

function switchCo(k){
  co=DB[k]; price=co.price;
  document.getElementById('price-inp').value=price;
  document.getElementById('co-name').textContent=co.name;
  document.getElementById('co-info').textContent=co.ticker+' · '+co.sector;
  document.querySelectorAll('.co-btn').forEach(b=>{
    const act=b.dataset.k===k;
    b.classList.toggle('active',act);
    b.style.background=act?co.color:'transparent';
    b.style.borderColor=act?co.color:'';
    b.style.color=act?'#fff':'';
  });
  document.querySelectorAll('.tab.active').forEach(t=>t.style.color=co.color);
  resetIS(); showTab(curTab); recalc();
}

function calcDCF(){
  if(dr<=tg)return 0;
  let pv=0;
  for(let i=1;i<=10;i++)pv+=(co.fcf[9]*Math.pow(1+gr/100,i))/Math.pow(1+dr/100,i);
  const tv=(co.fcf[9]*Math.pow(1+gr/100,10)*(1+tg/100))/(dr/100-tg/100);
  return (pv+tv/Math.pow(1+dr/100,10)-co.netDebt[9])/co.shares;
}
function calcMult(){
  const nd=co.netDebt[9],sh=co.shares;
  const f=(co.fcf[9]*tEVF-nd)/sh,p=co.eps[9]*tPER,e=(co.ebitda[9]*tEVE-nd)/sh;
  return{f,p,e,avg:(f+p+e)/3};
}
function calcISModel(){
  const rows=[];let ps=co.sales[9],psh=co.shares;
  for(let i=0;i<5;i++){
    const s=ps*(1+isSG[i]/100),eb=s*isEM[i]/100,ebit=eb*0.73;
    const nopat=ebit*(1-isTR[i]/100),cx=s*isCX[i]/100;
    const dwc=(s-ps)*Math.abs(isWC[i])/100*(isWC[i]<0?1:-1);
    const fcf=nopat+(eb-ebit)-cx+dwc,sh=psh*(1+isDI[i]/100);
    const nd=Math.max(0,(rows[i-1]?.nd??co.netDebt[9])-fcf*0.3);
    rows.push({yr:co.pY[i],s,eb,fcf,eps:nopat/sh,sh,nd,em:isEM[i],fm:fcf/s*100});
    ps=s;psh=sh;
  }return rows;
}
function calcMoat(){
  const r9=co.roic[9],rt=co.roic[9]-co.roic[0],sg=cagr(co.sales[9],co.sales[0],9);
  const fm=co.fcfM[9],dd=co.netDebt[9]/co.ebitda[9],cx=co.isD.cx[0];
  const items=[
    {n:"Switching costs / monopolio tecnológico",w:15,s:co.ticker==='ASML'?98:co.ticker==='CSU'?95:60,why:co.ticker==='ASML'?'Único fabricante EUV del mundo. Sin sustituto posible.':co.ticker==='CSU'?'VMS crítico. Cambiar = meses de riesgo operativo.':'AWS + Prime + Marketplace. Costes de cambio moderados.'},
    {n:"CapEx / Ventas (ligereza de activos)",w:10,s:Math.min(100,Math.max(0,Math.round((1-cx/10)*100))),why:`CapEx/Ventas ${cx}%. ${cx<3?'Negocio extremadamente ligero en activos.':cx<7?'CapEx moderado, razonable para el sector.':'CapEx intensivo, penaliza conversión a FCF.'}`},
    {n:"Working Capital negativo",w:10,s:co.isD.wc[0]<-15?90:co.isD.wc[0]<-5?70:40,why:`WC/Ventas ${co.isD.wc[0]}%. ${co.isD.wc[0]<-10?'Clientes pagan anticipado. Ventaja de financiación estructural.':'Working capital neutro.'}`},
    {n:"ROIC vs coste de capital",w:15,s:r9>=20?95:r9>=15?75:r9>=10?50:25,why:`ROIC ${P(r9)} vs coste capital ~9%. Spread de ${(r9-9).toFixed(0)}pp. ${r9>=20?'Excepcional creación de valor.':r9>=15?'Buena creación de valor.':'Creación marginal de valor.'}`},
    {n:"Tendencia ROIC 10 años",w:8,s:rt>=0?85:rt>=-10?55:rt>=-20?30:15,why:`De ${co.roic[0]}% (2016) a ${r9}% (2025). ${rt>=0?'Tendencia estable o creciente ✓':rt>=-10?'Bajista moderado, vigilar.':'Caída significativa, preocupante.'}`},
    {n:"Margen FCF consistente",w:12,s:fm>=20?90:fm>=15?72:fm>=10?52:28,why:`Margen FCF ${P(fm)}. ${fm>=20?'Muy eficiente convirtiendo ventas en cash.':fm>=15?'Buena conversión.':'Conversión por debajo de la media.'}`},
    {n:"CAGR Ventas 10 años",w:12,s:sg>=20?95:sg>=15?78:sg>=10?58:38,why:`CAGR ${P(sg)}. ${sg>=20?'Crecimiento excepcional. Sin un año negativo.':sg>=15?'Muy buen crecimiento sostenido.':'Crecimiento sólido pero moderado.'}`},
    {n:"Capital allocation / reinversión FCF",w:10,s:co.ticker==='CSU'?90:co.ticker==='ASML'?78:65,why:co.ticker==='CSU'?'81% FCF en adquisiciones a 3-7x EBITDA desde 1995. Excepcional.':co.ticker==='ASML'?'Dividendos crecientes + recompras. Buena allocación.':'Reinversión en AWS + IA. Elevado CapEx expansión.'},
    {n:"Sin dilución accionarial",w:8,s:Math.max(0,100-Math.abs(co.isD.di[0])*10),why:`Dilución anual: ${co.isD.di[0]}%. ${Math.abs(co.isD.di[0])<0.5?'Sin dilución. Todo el crecimiento va al accionista.':Math.abs(co.isD.di[0])<2?'Dilución mínima, aceptable.':'Dilución moderada, penaliza al accionista.'}`},
    {n:"Solidez balance (Deuda/EBITDA)",w:10,s:dd<0?100:dd<1?88:dd<2?68:dd<3?42:12,why:`Deuda/EBITDA ${dd.toFixed(1)}x. ${dd<0?'Posición neta de caja. Balance excepcional.':dd<1?'Balance muy sólido.':dd<2?'Manejable, sin riesgo.':'Apalancamiento elevado, vigilar.'}`},
  ];
  let tot=0,w=0;items.forEach(it=>{tot+=it.s*it.w;w+=it.w;});
  const ov=Math.round(tot/w);
  return{items,overall:ov,label:ov>=85?"MOAT EXCEPCIONAL":ov>=70?"MOAT SÓLIDO":ov>=55?"MOAT MODERADO":"MOAT DÉBIL",color:ov>=85?"#16a34a":ov>=70?"#0891b2":ov>=55?"#d97706":"#dc2626"};
}

function recalc(){
  price=Number(document.getElementById('price-inp').value)||co.price;
  const dcf=calcDCF(),mult=calcMult();
  const ud=(dcf-price)/price*100,um=(mult.avg-price)/price*100,ms=Math.min(ud,um);
  const verd=ms>20?"COMPRAR":ms>-5?"MANTENER":"EVITAR",vc=cu(ms);
  const vv=document.getElementById('vval'),vm=document.getElementById('vms'),vb=document.getElementById('vbox');
  if(vv){vv.textContent=verd;vv.style.color=vc;}
  if(vm){vm.textContent='MdS: '+ms.toFixed(1)+'%';vm.style.color=vc;}
  if(vb)vb.style.borderColor=vc;
}

function showTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>{
    const act=t.dataset.t===tab;
    t.classList.toggle('active',act);
    t.style.color=act?co.color:'';
    t.style.borderBottomColor=act?co.color:'transparent';
  });
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const el=document.getElementById('cnt');
  if(tab==='resumen')el.innerHTML=rResumen();
  else if(tab==='graficos')el.innerHTML=rGraficos();
  else if(tab==='valoracion')el.innerHTML=rValoracion();
  else if(tab==='proyecciones')el.innerHTML=rProyecciones();
  else if(tab==='academia')el.innerHTML=rAcademia();
  else if(tab==='academia')el.innerHTML=rAcademia();
  else if(tab==='moat')el.innerHTML=rMoat();
  else if(tab==='tesis')el.innerHTML=rTesis();
  else if(tab==='noticias')el.innerHTML=rNoticias();
  else if(tab==='alertas')el.innerHTML=rAlertas();
  injectTips();
  setTimeout(()=>buildCharts(tab),80);
}

function sld(id,lbl,val,min,max,step,unit,color,hint){
  return`<div class="slrow">
    <div class="sllbl"><span>${lbl}</span>
      <div style="display:flex;align-items:center;gap:5px;">
        <input type="number" value="${val}" class="numinp" style="color:${color};border-color:${color}40;" onchange="${id}=+this.value;document.getElementById('r${id}').value=+this.value;recalc()"/>
        <span style="font-size:11px;color:var(--muted)">${unit}</span>
      </div>
    </div>
    <input type="range" id="r${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="accent-color:${color}" oninput="${id}=+this.value;this.previousElementSibling.querySelector('input').value=this.value;recalc()"/>
    ${hint?`<div class="sh">💡 ${hint}</div>`:''}
  </div>`;
}

function rResumen(){
  const dcf=calcDCF(),mult=calcMult();
  const gn=Math.sqrt(22.5*co.eps[9]*(co.equity/co.shares));
  const ud=(dcf-price)/price*100,um=(mult.avg-price)/price*100;
  const idx=Math.min(hor,5)-1;
  const pfr=((co.pF[idx]*tEVF-co.pND[idx])/co.shares)/Math.pow(1+ret/100,hor);
  const vs=[{l:"DCF Base",tid:"dcf",v:N(dcf),up:ud,c:"#2563eb"},{l:"EV/FCF",tid:"evfcf",v:N(mult.f),up:(mult.f-price)/price*100,c:"#b45309"},{l:"PER",tid:"per",v:N(mult.p),up:(mult.p-price)/price*100,c:"#7c3aed"},{l:"EV/EBITDA",tid:"evEbitda",v:N(mult.e),up:(mult.e-price)/price*100,c:"#2563eb"},{l:"Graham #",tid:"graham",v:N(gn),up:(gn-price)/price*100,c:"#5a5650"},{l:"Precio p/"+ret+"%",tid:"margenSeg",v:N(pfr),up:(pfr-price)/price*100,c:"#16a34a"}];
  const chk=[
    {ok:true,c:"Negocio comprensible",d:co.desc.substring(0,80)+"…"},
    {ok:co.roic[9]>=15,c:"ROIC > coste de capital",d:`ROIC actual ${P(co.roic[9])}. ${co.roic[9]>=20?'Excepcional.':co.roic[9]>=15?'Bueno.':'Por mejorar.'}`},
    {ok:cagr(co.sales[9],co.sales[0],9)>=10,c:"Crecimiento ventas consistente",d:`CAGR 10Y: ${P(cagr(co.sales[9],co.sales[0],9))}. Sin años negativos.`},
    {ok:co.netDebt[9]/co.ebitda[9]<2,c:"Balance sólido",d:`Deuda/EBITDA ${(co.netDebt[9]/co.ebitda[9]).toFixed(1)}x. ${co.netDebt[9]<0?'Posición neta de caja.':'Sin riesgo de quiebra.'}`},
    {ok:co.fcfM[9]>=10,c:"FCF positivo y creciente",d:`Margen FCF ${P(co.fcfM[9])}. De $${N(co.fcf[0])}M (2016) a $${N(co.fcf[9])}M (2025).`},
    {ok:co.isD.wc[0]<-5,c:"Working capital favorable",d:`WC/Ventas ${co.isD.wc[0]}%. ${co.isD.wc[0]<-10?'Clientes financian el crecimiento.':'WC moderadamente favorable.'}`},
    {ok:Math.abs(co.isD.di[0])<1,c:"Sin dilución significativa",d:`Dilución anual: ${co.isD.di[0]}%. ${Math.abs(co.isD.di[0])<0.5?'Cero dilución. Ejemplar.':'Dilución mínima.'}`},
    {ok:Math.min(ud,um)>-5,c:"Precio con margen de seguridad",d:`MdS ${Math.min(ud,um).toFixed(1)}%. ${Math.min(ud,um)>20?'Precio atractivo.':Math.min(ud,um)>0?'Precio razonable.':'Precio ajustado.'}`},
  ];
  return`<div class="card" style="background:${co.color}09;border-color:${co.color}35;"><p style="font-size:13px;color:var(--sub);line-height:1.75;">${co.desc}</p></div>
  <div class="kgrid">
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('ventas',this)">📦 Ventas 2025 <span style="font-size:9px;border-bottom:1px dashed #2563eb60;color:#2563eb;">?</span></div><div class="kval" style="color:#2563eb">$${N(co.sales[9])}M</div><div class="ksub">CAGR 10Y: ${P(cagr(co.sales[9],co.sales[0],9))}</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('fcf',this)">💵 FCF 2025 <span style="font-size:9px;border-bottom:1px dashed #16a34a60;color:#16a34a;">?</span></div><div class="kval" style="color:#16a34a">$${N(co.fcf[9])}M</div><div class="ksub">Margen: ${P(co.fcfM[9])}</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('roic',this)">🎯 ROIC 2025 <span style="font-size:9px;border-bottom:1px dashed #b4530960;color:#b45309;">?</span></div><div class="kval" style="color:#b45309">${P(co.roic[9])}</div><div class="ksub">vs ${P(co.roic[0])} en 2016</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('ebitda',this)">💼 EBITDA 2025 <span style="font-size:9px;border-bottom:1px dashed #b4530960;color:#b45309;">?</span></div><div class="kval" style="color:#b45309">$${N(co.ebitda[9])}M</div><div class="ksub">Margen: ${P(co.ebitdaM[9])}</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('eps',this)">📈 EPS 2025 <span style="font-size:9px;border-bottom:1px dashed #d9770660;color:#d97706;">?</span></div><div class="kval" style="color:#d97706">$${N(co.eps[9],2)}</div><div class="ksub">FCF/Acc: $${N(co.fcfps[9],2)}</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('netDebt',this)">🏦 Deuda/EBITDA <span style="font-size:9px;border-bottom:1px dashed #dc262660;color:#dc2626;">?</span></div><div class="kval" style="color:#0891b2">${(co.netDebt[9]/co.ebitda[9]).toFixed(1)}x</div><div class="ksub">ND $${N(co.netDebt[9])}M</div></div>
    <div class="kpi"><div class="klbl" style="cursor:pointer" onclick="showTip('evfcf',this)">🏆 EV/FCF actual <span style="font-size:9px;border-bottom:1px dashed #b4530960;color:#b45309;">?</span></div><div class="kval" style="color:#7c3aed">${Math.round((price*co.shares+co.netDebt[9])/co.fcf[9])}x</div><div class="ksub">Mediana hist: ${co.medEvFcf}x</div></div>
    <div class="kpi"><div class="klbl">🏢 Market Cap</div><div class="kval" style="color:${co.color}">$${N(Math.round(price*co.shares/1000))}B</div><div class="ksub">Precio: $${N(price)}</div></div>
  </div>
  <div class="card"><div class="ctitle">Resumen Valoraciones — <span style="font-style:italic;text-transform:none;font-weight:400;font-size:9px;">clic en el nombre para ver la definición</span></div>
  <div class="valgrid">${vs.map(m=>`<div class="valcard" style="border-top-color:${cu(m.up)};"><div class="vallbl" style="cursor:pointer" onclick="showTip('${m.tid||''}',this)">${m.l}${m.tid?` <span style="font-size:8px;border-bottom:1px dashed ${cu(m.up)}60;">?</span>`:''}</div><div class="valval" style="color:${m.c};">$${m.v}</div><div class="valup" style="color:${cu(m.up)}">${m.up>0?'+':''}${m.up.toFixed(1)}%</div></div>`).join('')}</div></div>
  <div class="card"><div class="ctitle">Checklist Warren Buffett</div>
  <div class="checklist">${chk.map(it=>`<div class="chk-item" style="background:${it.ok?'#f0fdf4':'#fef2f2'};border:1px solid ${it.ok?'#bbf7d0':'#fecaca'};"><span style="font-size:18px;flex-shrink:0">${it.ok?'✅':'❌'}</span><div><div class="chk-title" style="color:${it.ok?'#16a34a':'#dc2626'}">${it.c}</div><div class="chk-desc" style="color:var(--sub)">${it.d}</div></div></div>`).join('')}</div></div>`;
}

function fmtAI(t){return t.split('\n').map(l=>{
  if(l.startsWith('## '))return`<h3>${l.replace('## ','')}</h3>`;
  if(l.startsWith('- ')||l.startsWith('• ')){const txt=l.replace(/^[-•] /,'');const has=t=>txt.includes(t);const bg2=has('🟢')?'#f0fdf4':has('🔴')?'#fef2f2':has('🟡')?'#fffbeb':'transparent';const bd2=has('🟢')?'1px solid #bbf7d0':has('🔴')?'1px solid #fecaca':has('🟡')?'1px solid #fde68a':'none';return`<div style="padding:${bg2!=='transparent'?'7px 11px':'2px 4px'};margin:3px 0;background:${bg2};border:${bd2};border-radius:6px;">${txt.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</div>`;}
  if(l.trim()==='')return'<div style="height:5px"></div>';
  return`<p style="margin:3px 0;">${l.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</p>`;
}).join('');}

  const prompt=`Eres Warren Buffett analizando ${co.name} (${co.ticker}). Genera una tesis de inversión en español con estos apartados en Markdown:\n## 1. Resumen Ejecutivo\n## 2. El Negocio y su MOAT\n## 3. Análisis Financiero\n## 4. Valoración\n## 5. Riesgos Principales\n## 6. Conclusión y Posición\n\nDATOS CLAVE 2025: Ventas $${N(co.sales[9])}M (CAGR ${P(cagr(co.sales[9],co.sales[0],9))}), FCF $${N(co.fcf[9])}M (margen ${P(co.fcfM[9])}), ROIC ${co.roic[9]}%, Deuda/EBITDA ${(co.netDebt[9]/co.ebitda[9]).toFixed(1)}x, Precio $${N(price)}, EV/FCF ${Math.round((price*co.shares+co.netDebt[9])/co.fcf[9])}x (mediana hist ${co.medEvFcf}x), MOAT ${moat.overall}/100 (${moat.label}), DCF $${N(dcf)}, Veredicto ${verd}, MdS ${ms.toFixed(1)}%. Máx 500 palabras. Directo con números concretos.`;

    bench:[{v:'8-10%',c:'#16a34a',bg:'#f0fdf4',label:'Para compounders de calidad'},{v:'10-12%',c:'#d97706',bg:'#fffbeb',label:'Estándar de mercado'},{v:'>14%',c:'#dc2626',bg:'#fef2f2',label:'Negocios de alto riesgo'}],
    ref:'"Valuation: Measuring and Managing the Value of Companies", McKinsey & Company (8ª ed.). El WACC es estándar en banca de inversión. Damodaran (NYU) publica WACCs por sector en su web.'},

  capex:{emoji:'🔨',title:'CapEx — Capital Expenditure',color:'#d97706',tag:'FLUJO DE CAJA',
    def:'La inversión en activos físicos (maquinaria, edificios, infraestructura) para mantener o expandir el negocio. Los mejores negocios para Buffett son los que generan mucho FCF con poco CapEx — negocios "ligeros en activos".',
    formula:'CapEx de mantenimiento: mantiene el negocio actual (resta del FCF)\nCapEx de expansión: crece el negocio (inversión futura)\nFCF real = Flujo Operativo − CapEx de mantenimiento',
    example:'CSU: CapEx $68M / $11.623M ventas = 0.6%. Extraordinariamente ligero. ASML: ~3% de ventas. Amazon: ~9% de ventas (incluye data centers de AWS). Coca-Cola: ~4%. Compare con una siderúrgica: 12-18%.',
    bench:[{v:'<3%',c:'#16a34a',bg:'#f0fdf4',label:'Negocio ligero en activos'},{v:'3-8%',c:'#d97706',bg:'#fffbeb',label:'Moderado'},{v:'>12%',c:'#dc2626',bg:'#fef2f2',label:'Capital intensivo'}],
    ref:'Buffett en Berkshire Annual Letter 1992: "Los negocios verdaderamente maravillosos no requieren mucho capital para crecer." See\'s Candies: genera $80M/año con solo $40M de activos fijos.'},

  wc:{emoji:'🔄',title:'Working Capital (Capital Circulante)',color:'#0891b2',tag:'BALANCE',
    def:'La diferencia entre activos corrientes (lo que se cobra pronto) y pasivos corrientes (lo que se debe pagar pronto). Un WC negativo significa que los clientes pagan ANTES de que la empresa incurra en costes — una ventaja financiera estructural enorme.',
    formula:'WC = Activos Corrientes − Pasivos Corrientes\n= (Caja + Cuentas a Cobrar + Inventario) − (Cuentas a Pagar + Ingresos Diferidos)\nΔWC positivo = consume caja | ΔWC negativo = genera caja',
    example:'CSU: WC/Ventas −20% — los clientes pagan licencias anuales por adelantado. $2.333M en ingresos diferidos en 2025. Amazon: −7% — cobra en 1-2 días, paga a proveedores en 45-60 días. Esto financia su crecimiento gratis.',
    bench:[{v:'WC negativo',c:'#16a34a',bg:'#f0fdf4',label:'Ventaja: clientes financian la empresa'},{v:'WC neutro',c:'#d97706',bg:'#fffbeb',label:'Normal'},{v:'WC muy positivo',c:'#dc2626',bg:'#fef2f2',label:'⚠️ Consume caja al crecer'}],
    ref:'"Competition Demystified", Greenwald & Kahn (2005). El WC negativo es una de las formas más poderosas de ventaja competitiva financiera, ya que reduce drásticamente el capital necesario para financiar el crecimiento.'},

  moat:{emoji:'🏰',title:'MOAT — Ventaja Competitiva Duradera',color:'#1e3a5f',tag:'ANÁLISIS CUALITATIVO',
    def:'Término acuñado por Buffett. Un "foso" económico es la ventaja competitiva que protege los beneficios de una empresa frente a la competencia, igual que un foso protegía un castillo medieval. Sin moat, los beneficios son efímeros.',
    formula:'No hay fórmula — es cualitativo. Los 5 tipos según Morningstar:\n1) Intangibles (marcas, patentes)\n2) Switching costs (coste de cambio)\n3) Network effects (red de usuarios)\n4) Cost advantages (escala)\n5) Efficient scale (mercado de tamaño limitado)',
    example:'CSU: switching costs altísimos — VMS crítico, cambiar implica 6-12 meses de riesgo operativo. ASML: monopolio tecnológico — único fabricante de litografía EUV, imposible de replicar en 10+ años. Visa: efectos de red — 4.300M de tarjetas, 100M de comercios.',
    bench:[{v:'MOAT >85',c:'#16a34a',bg:'#f0fdf4',label:'Excepcional (Visa, ASML, CSU)'},{v:'MOAT 70-84',c:'#0891b2',bg:'#f0fdfa',label:'Sólido'},{v:'MOAT <55',c:'#dc2626',bg:'#fef2f2',label:'Frágil — evitar a largo plazo'}],
    ref:'Buffett en Berkshire Annual Letter 1995: "La clave para invertir es determinar la ventaja competitiva de cualquier empresa y, sobre todo, la durabilidad de esa ventaja." Libro recomendado: "The Little Book That Builds Wealth", Pat Dorsey.'},

  graham:{emoji:'📖',title:'Graham Number',color:'#5a5650',tag:'VALORACIÓN',
    def:'Fórmula conservadora de Benjamin Graham (el mentor de Buffett) para calcular el precio máximo razonable a pagar por una acción. Muy conservadora — diseñada para proteger capital, no para identificar compounders de calidad.',
    formula:'Graham Number = √(22.5 × EPS × Book Value por Acción)\nEl 22.5 = 15 (PER máximo Graham) × 1.5 (P/Book máximo)\nSi el precio está por debajo = barato incluso con criterios muy conservadores',
    example:'CSU 2025: EPS $60.55 × Book Value $169/acción → Graham Number ≈ $481. Cotiza a $2.663 = 5.5x el Graham Number. Esto no significa que esté cara — Graham no contemplaba negocios con ROIC del 30%+ y sin activos físicos.',
    bench:[{v:'Precio < Graham#',c:'#16a34a',bg:'#f0fdf4',label:'Ultra-conservador: comprar'},{v:'1-2x Graham#',c:'#d97706',bg:'#fffbeb',label:'Razonable para negocios normales'},{v:'>3x Graham#',c:'#7c3aed',bg:'#f5f3ff',label:'Solo justificado con ROIC muy alto'}],
    ref:'"The Intelligent Investor", Benjamin Graham (1949). Nota: Graham desarrolló esta fórmula para empresas industriales de los años 40-50. Para empresas de software o tech con activos intangibles, el Book Value es poco relevante.'},
};

function showTip(id, el){
  const t=TIPS[id]; if(!t) return;
  document.getElementById('tip-emoji').textContent=t.emoji;
  document.getElementById('tip-title').textContent=t.title;
  const tag=document.getElementById('tip-tag');
  tag.textContent=t.tag; tag.style.background=t.color+'18'; tag.style.color=t.color;
  document.getElementById('tip-def').textContent=t.def;
  const fBox=document.getElementById('tip-formula');
  fBox.textContent=t.formula; fBox.style.background=t.color+'0e'; fBox.style.color=t.color;
  document.getElementById('tip-example').textContent=t.example;
  const benchRow=document.getElementById('tip-bench-row');
  const benchEl=document.getElementById('tip-bench');
  if(t.bench){
    benchRow.style.display='block';
    benchEl.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;">'+
      t.bench.map(b=>`<span style="padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:${b.bg};color:${b.c};">${b.v} — ${b.label}</span>`).join('')+'</div>';
  } else { benchRow.style.display='none'; }
  document.getElementById('tip-ref').textContent=t.ref;

  // Position the tooltip
  const box=document.getElementById('tip-box');
  box.style.display='block';
  const rect=el.getBoundingClientRect();
  const bw=320, bh=460;
  let top=rect.bottom+8, left=rect.left;
  if(top+bh>window.innerHeight) top=rect.top-bh-8;
  if(left+bw>window.innerWidth) left=window.innerWidth-bw-12;
  if(left<8) left=8;
  box.style.top=Math.max(8,top)+'px';
  box.style.left=left+'px';
  document.getElementById('tip-overlay').style.display='block';
}
function closeTip(){
  document.getElementById('tip-box').style.display='none';
  document.getElementById('tip-overlay').style.display='none';
}
function tip(id,label,color){
  const c=color||TIPS[id]?.color||'#1e3a5f';
  return `<span class="tip" style="border-color:${c}60;color:inherit;" onclick="showTip('${id}',this)">${label}</span>`;
}

function toggleAcCard(card){
  const expand=card.querySelector('.ac-expand');
  const arrow=card.querySelector('.ac-arrow');
  const isOpen=expand.classList.contains('open');
  // Close all
  document.querySelectorAll('.ac-expand.open').forEach(e=>{e.classList.remove('open');});
  document.querySelectorAll('.ac-arrow').forEach(a=>{a.style.transform='rotate(0deg)';});
  // Open this one if it was closed
  if(!isOpen){ expand.classList.add('open'); arrow.style.transform='rotate(180deg)'; }
}
function filterAc(filter, btn){
  document.querySelectorAll('.ac-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#ac-grid .ac-card').forEach(card=>{
    card.style.display=(filter==='all'||card.dataset.section===filter)?'block':'none';
  });
}

// After showTab renders new content, we replace known terms with clickable tips
function injectTips(){
  // Map of text patterns to tip IDs — applied to the rendered content
  const el=document.getElementById('cnt');
  if(!el) return;
  // We use title attributes on KPI labels to hint at tips
  el.querySelectorAll('[data-tip]').forEach(node=>{
    const id=node.dataset.tip;
    if(TIPS[id]) node.onclick=()=>showTip(id,node);
  });
}
