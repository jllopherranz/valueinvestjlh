<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Proyecto Value Invest — CSU · ASML · AMZN · MSFT · AAPL · GOOGL · META · NVDA</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- TradingView Widget -->
<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f5f4f1;color:#1a1814;}
:root{
  --navy:#1e3a5f;--blue:#2563eb;--green:#16a34a;--amber:#d97706;--red:#dc2626;
  --gold:#b45309;--purple:#7c3aed;--teal:#0891b2;
  --surface:#fff;--border:#e4e0d8;--muted:#9a958e;--sub:#5a5650;
}

/* ── HEADER ── */
.hdr{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.hdr-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:8px;}
.brand{font-weight:700;font-size:15px;color:var(--navy);display:flex;align-items:center;gap:7px;}
.co-btns{display:flex;gap:6px;}
.co-btn{padding:4px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:var(--sub);transition:all .15s;}
.co-btn.active{color:#fff;}
.coinfo{font-size:11px;color:var(--muted);padding-left:10px;border-left:1px solid var(--border);}
.coname{font-size:14px;font-weight:700;}
.price-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

/* Price box - real-time aware */
.price-box{text-align:center;border:1px solid var(--border);border-radius:9px;padding:5px 12px;background:#f9f8f6;position:relative;}
.price-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:1px;display:flex;align-items:center;gap:4px;}
.price-inp{border:none;background:transparent;font-size:20px;font-weight:700;width:110px;text-align:center;outline:none;color:var(--blue);transition:color .3s;}
.price-live-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:8px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;display:none;cursor:pointer;}
.price-live-badge.visible{display:inline-flex;align-items:center;gap:3px;}
.price-live-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:livepulse 2s infinite;}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.4);}}
.price-change{font-size:10px;font-weight:600;margin-top:2px;min-height:14px;}
.price-flash-up{animation:flashUp .6s ease-out;}
.price-flash-dn{animation:flashDn .6s ease-out;}
@keyframes flashUp{0%{background:#dcfce7;}100%{background:transparent;}}
@keyframes flashDn{0%{background:#fee2e2;}100%{background:transparent;}}

.vbox{text-align:center;border-radius:9px;padding:6px 14px;border:1.5px solid var(--border);min-width:90px;}
.vlbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.vval{font-size:17px;font-weight:800;letter-spacing:.5px;}
.vms{font-size:10px;font-weight:600;}

/* Earnings badge */
.earnings-badge{display:none;align-items:center;gap:6px;padding:5px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:9px;font-size:11px;font-weight:600;color:#92400e;}
.earnings-badge.visible{display:flex;}
.earnings-dot{width:7px;height:7px;border-radius:50%;background:#d97706;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}

.tabs{display:flex;gap:0;overflow-x:auto;border-top:1px solid var(--border);scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{background:transparent;border:none;border-bottom:2.5px solid transparent;padding:7px 14px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);white-space:nowrap;transition:all .15s;}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);}

/* ── CONTENT ── */
.cnt{padding:16px 20px;max-width:1280px;margin:0 auto;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.03);}
.ctitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:11px;}

/* ── KPI GRID WITH ACCORDION ── */
.kgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:12px;}
.kpi{background:#f7f6f3;border-radius:10px;padding:0;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.kpi:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);}
.kpi-main{padding:11px 13px;}
.klbl{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.kval{font-size:19px;font-weight:700;}
.ksub{font-size:10px;color:var(--muted);margin-top:2px;}
.kpi-expand{display:none;padding:10px 13px;border-top:1px solid var(--border);background:#fff;font-size:11px;line-height:1.65;color:var(--sub);}
.kpi-expand.open{display:block;}
.kpi-toggle{float:right;font-size:12px;color:var(--muted);margin-top:2px;transition:transform .2s;}
.kpi-expand-arrow{display:inline-block;transition:transform .2s;font-size:10px;color:var(--muted);}
.kpi.expanded .kpi-expand-arrow{transform:rotate(180deg);}
.kpi-def{margin-bottom:7px;}
.kpi-analysis{padding:8px 10px;border-radius:8px;margin-bottom:7px;font-weight:500;}
.kpi-bench{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.bench-pill{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;}

/* ── VALUATION GRID ── */
.valgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px;}
.valcard{background:#f7f6f3;border-radius:10px;padding:10px;text-align:center;border-top:2.5px solid transparent;}
.vallbl{font-size:9px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.valval{font-size:18px;font-weight:700;}
.valup{font-size:10px;font-weight:600;margin-top:2px;}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:380px 1fr;gap:14px;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ── SLIDERS ── */
.slrow{margin-bottom:11px;}
.sllbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:12px;color:var(--sub);}
.slnum{font-size:12px;font-weight:700;}
.numinp{width:60px;border:1.5px solid #e4e0d8;border-radius:6px;padding:2px 6px;font-size:12px;font-weight:700;text-align:center;background:#f7f6f3;outline:none;}
input[type=range]{width:100%;height:4px;cursor:pointer;accent-color:var(--navy);}
.sh{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── SCENARIO BUTTONS ── */
.scenbtns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;}
.scenbtn{padding:3px 10px;border-radius:20px;border:1.5px solid;background:transparent;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}

/* ── INCOME STATEMENT TABLE ── */
.is-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.is-tbl th{padding:5px 6px;font-weight:700;font-size:9px;color:var(--muted);border-bottom:1.5px solid var(--border);text-transform:uppercase;letter-spacing:.05em;}
.is-tbl td{padding:4px 6px;border-bottom:1px solid #f0ede8;}
.isinp{width:46px;border:none;background:#fffbeb;border-radius:4px;text-align:right;font-size:11px;font-weight:700;color:#d97706;outline:none;padding:2px 3px;border:1px solid #fde68a;}
.isres{text-align:right;font-size:11px;font-weight:700;}
.mpbar{display:flex;justify-content:space-between;align-items:center;border-radius:10px;padding:10px 14px;margin-top:10px;border:1px solid var(--border);}

/* ── VERDICT ── */
.vdict{border-radius:14px;padding:16px;margin-bottom:12px;}
.vdict-big{font-size:30px;font-weight:800;letter-spacing:.5px;margin-bottom:6px;}
.vdict-desc{font-size:12px;line-height:1.7;margin-bottom:12px;color:var(--sub);}
.minigrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.minicard{background:rgba(255,255,255,.6);border-radius:9px;padding:9px;text-align:center;}
.minilbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.minival{font-size:15px;font-weight:700;margin-top:2px;}

/* ── SENSITIVITY TABLE ── */
.sens-tbl{width:100%;border-collapse:separate;border-spacing:3px;font-size:11px;}
.sens-tbl th{padding:6px 10px;background:#f7f6f3;color:var(--muted);border-radius:5px;font-size:10px;}
.sens-td{padding:6px 10px;text-align:center;border-radius:5px;font-size:11px;}

/* ── MOAT ── */
.moat-bar-wrap{height:16px;background:#f0ede8;border-radius:8px;overflow:hidden;margin-bottom:12px;}
.moat-fill{height:100%;border-radius:8px;transition:width .5s ease;}
.crit{border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;}
.crit-name{font-size:12px;font-weight:700;margin-bottom:2px;}
.crit-why{font-size:11px;color:var(--sub);margin-bottom:5px;line-height:1.5;}
.crit-row{display:flex;align-items:center;gap:9px;}
.crit-prog{flex:1;height:6px;background:#f0ede8;border-radius:3px;overflow:hidden;}
.crit-fill{height:100%;border-radius:3px;transition:width .4s;}
.score-badge{font-size:13px;font-weight:700;min-width:40px;text-align:right;}

/* ── ALERTS ── */
.alrow{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-radius:10px;margin-bottom:6px;font-size:12px;line-height:1.55;}
.albadge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-left:auto;text-transform:uppercase;letter-spacing:.05em;}

/* ── PROJECTIONS TABLE ── */
.ptbl{width:100%;border-collapse:collapse;font-size:12px;}
.ptbl th,.ptbl td{padding:7px 10px;border-bottom:1px solid var(--border);}
.ptbl th{font-weight:700;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.htbl{width:100%;border-collapse:collapse;font-size:11px;}
.htbl th,.htbl td{padding:5px 8px;border-bottom:1px solid #f0ede8;}
.htbl th{font-weight:700;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}

/* ── AI BUTTONS ── */
.aibtn{padding:10px 20px;border-radius:10px;border:none;background:var(--navy);color:#fff;cursor:pointer;font-size:12px;font-weight:700;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.aibtn:hover{background:#2d5a9e;transform:translateY(-1px);box-shadow:0 4px 14px rgba(30,58,95,.3);}
.aibtn:disabled{background:var(--muted);cursor:not-allowed;transform:none;box-shadow:none;}
.aiout{background:#f7f6f3;border-radius:10px;padding:14px;font-size:12px;line-height:1.8;color:var(--sub);margin-top:11px;max-height:420px;overflow-y:auto;border:1px solid var(--border);}
.aiout h3{font-size:13px;font-weight:700;color:#1a1814;margin:14px 0 5px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.aiout h3:first-child{margin-top:0;}
.params-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:11px;}
.ptag{background:#f0ede8;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;color:var(--sub);}
.checklist{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media(max-width:700px){.checklist{grid-template-columns:1fr;}}
.chk-item{display:flex;gap:9px;padding:10px 12px;border-radius:9px;align-items:flex-start;}
.chk-title{font-size:12px;font-weight:700;margin-bottom:2px;}
.chk-desc{font-size:11px;line-height:1.55;}

/* ── NEWS ── */
.news-item{padding:11px 13px;border-radius:10px;margin-bottom:7px;border:1px solid var(--border);background:#fff;}
.news-headline{font-size:12px;font-weight:700;margin-bottom:4px;line-height:1.5;}
.news-meta{display:flex;gap:8px;align-items:center;font-size:10px;color:var(--muted);}
.news-sentiment{padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.news-loading{text-align:center;padding:30px;color:var(--muted);font-size:12px;}

/* ── TOOLTIPS ── */
.tip{border-bottom:1.5px dashed;cursor:pointer;position:relative;display:inline;}
.tip:hover{opacity:.8;}
#tip-overlay{display:none;position:fixed;inset:0;z-index:900;background:transparent;}
#tip-box{display:none;position:fixed;z-index:999;width:320px;background:#fff;border-radius:14px;box-shadow:0 8px 40px rgba(0,0,0,.16);border:1px solid #e4e0d8;overflow:hidden;}
.tip-head{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:10px;}
.tip-emoji{font-size:22px;flex-shrink:0;margin-top:1px;}
.tip-title{font-size:14px;font-weight:700;color:#1a1814;margin-bottom:2px;}
.tip-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 7px;border-radius:20px;}
.tip-body{padding:0 16px 14px;font-size:12px;line-height:1.75;color:#5a5650;}
.tip-formula{font-family:monospace;font-size:11px;padding:7px 11px;border-radius:7px;margin:8px 0;}
.tip-row{margin-bottom:6px;}
.tip-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a958e;margin-bottom:2px;}
.tip-close{position:absolute;top:10px;right:12px;background:none;border:none;cursor:pointer;font-size:16px;color:#9a958e;line-height:1;}
.tip-close:hover{color:#1a1814;}

/* ── ACADEMIA ── */
.ac-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:16px;}
.ac-card{background:#fff;border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:box-shadow .15s,transform .15s;}
.ac-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.09);transform:translateY(-2px);}
.ac-head{padding:16px 18px 12px;display:flex;gap:12px;align-items:flex-start;}
.ac-emoji{font-size:28px;flex-shrink:0;}
.ac-title{font-size:14px;font-weight:700;color:#1a1814;margin-bottom:3px;}
.ac-tag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 8px;border-radius:20px;display:inline-block;}
.ac-summary{padding:0 18px 14px;font-size:12px;color:#5a5650;line-height:1.65;}
.ac-expand{display:none;padding:0 18px 16px;border-top:1px solid #f0ede8;margin-top:2px;}
.ac-expand.open{display:block;}
.ac-section{margin-top:12px;}
.ac-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#9a958e;margin-bottom:5px;}
.ac-formula{font-family:monospace;font-size:11px;padding:9px 13px;border-radius:8px;line-height:1.6;}
.ac-example{padding:10px 13px;border-radius:8px;border-left:3px solid;font-size:12px;line-height:1.65;}
.ac-bench{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.ac-bench-item{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.ac-ref{font-size:11px;color:#5a5650;line-height:1.6;font-style:italic;}
.ac-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ac-filter{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--sub);transition:all .15s;}
.ac-filter.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f;}

/* ── DCF EXPLANATION TOOLTIP ── */
.dcf-info-box{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:11px 14px;margin-bottom:12px;font-size:11px;color:#1e40af;line-height:1.65;}
.dcf-info-box strong{font-weight:700;}

/* ── ROIC vs WACC chart note ── */
.chart-note{font-size:10px;color:var(--muted);margin-top:5px;text-align:center;}

/* ── TRADINGVIEW WIDGET ── */
.tv-widget-wrap{border-radius:10px;overflow:hidden;margin-top:5px;}

/* ── PRICE SIMULATOR ── */
.psim-wrap{background:#fff;border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-top:0;}
.psim-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.psim-title{font-size:12px;font-weight:700;color:#1e3a5f;}
.psim-input-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.psim-inp{width:110px;padding:7px 10px;border:2px solid var(--border);border-radius:9px;font-size:16px;font-weight:700;color:#1e3a5f;outline:none;text-align:center;transition:border-color .15s;}
.psim-inp:focus{border-color:#2563eb;}
.psim-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.psim-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.psim-kpi{border-radius:10px;padding:10px 11px;border:1.5px solid transparent;}
.psim-kpi-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px;}
.psim-kpi-val{font-size:17px;font-weight:800;line-height:1;}
.psim-kpi-sub{font-size:10px;margin-top:2px;font-weight:500;}
.psim-bar-wrap{height:6px;background:#f0ede8;border-radius:3px;margin-top:6px;overflow:hidden;}
.psim-bar-fill{height:100%;border-radius:3px;transition:width .3s;}
.psim-semaforo{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-top:12px;}
.psim-zone{border-radius:8px;padding:7px 4px;text-align:center;cursor:pointer;transition:transform .1s;}
.psim-zone:hover{transform:scale(1.04);}
.psim-zone-price{font-size:12px;font-weight:800;}
.psim-zone-lbl{font-size:9px;font-weight:600;margin-top:2px;}
.psim-zone-upside{font-size:10px;font-weight:700;margin-top:1px;}

/* ── HISTORICAL MULTIPLES PANEL ── */
.mult-hist-panel{margin-top:14px;border-top:1px solid var(--border);padding-top:12px;}
.mult-hist-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.mult-tabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.mult-tab{padding:3px 10px;border-radius:14px;border:1.5px solid var(--border);background:transparent;font-size:10px;font-weight:700;cursor:pointer;color:var(--muted);transition:all .12s;}
.mult-tab.active{color:#fff;}
.mult-chart-wrap{position:relative;height:150px;}
.mult-stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;}
.mult-stat{background:#f7f6f3;border-radius:8px;padding:7px 8px;text-align:center;}
.mult-stat-lbl{font-size:9px;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.05em;}
.mult-stat-val{font-size:15px;font-weight:700;}
.mult-current-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:6px;}


/* ── DCF EXPLAINER ACCORDION ── */
.dcf-explain{border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.dcf-explain-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;cursor:pointer;background:#f9f8f6;user-select:none;gap:8px;}
.dcf-explain-hdr:hover{background:#f3f2ef;}
.dcf-explain-title{font-size:11px;font-weight:700;color:#1e3a5f;display:flex;align-items:center;gap:6px;}
.dcf-explain-arrow{font-size:12px;color:var(--muted);transition:transform .2s;flex-shrink:0;}
.dcf-explain-body{display:none;padding:12px 14px;border-top:1px solid var(--border);background:#fff;font-size:11px;line-height:1.7;color:var(--sub);}
.dcf-explain-body.open{display:block;}
.dcf-explain-example{background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:9px 12px;margin-top:9px;font-size:11px;color:#1e40af;line-height:1.65;}
.dcf-explain-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}
.dcf-explain-kpi{background:#f7f6f3;border-radius:8px;padding:8px 10px;border-left:3px solid #2563eb;}
.dcf-explain-kpi-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.dcf-explain-kpi-val{font-size:14px;font-weight:800;color:#1e3a5f;}

/* ── VALUATION VISUAL (Resumen tab) ── */

function getLogoKey(c){return Object.keys(DB).find(k=>DB[k]===c)||'';}

function setLogo(co){
  const el=document.getElementById('co-logo');
  const wrap=document.getElementById('co-logo-wrap');
  if(!el) return;
  const k=getLogoKey(co);
  const lg=LOGOS[k];
  if(!lg){
    // SVG initials fallback
    _logoInitials(co,el,wrap);
    return;
  }
  // Try Clearbit first
  el.onerror=function(){
    // Try Google favicon fallback
    el.onerror=function(){
      // Final fallback: SVG initials
      _logoInitials(co,el,wrap);
    };
    el.src=lg.fb;
  };
  el.src=lg.src;
  el.style.display='block';
  if(wrap) wrap.style.display='flex';
}

function _logoInitials(co,el,wrap){
  // Generate SVG with company initials in brand color
  const initials=co.ticker.replace('.TO','').replace('.AS','').substring(0,2);
  const color=co.color||'#1e3a5f';
  const svg=`<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="${color}"/><text x="16" y="21" text-anchor="middle" font-family="-apple-system,sans-serif" font-size="12" font-weight="800" fill="white">${initials}</text></svg>`;
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  el.onerror=null;
  el.src=url;
  el.style.display='block';
  if(wrap) wrap.style.display='flex';
}

function _applyPrice(livePrice,prevClose,isLive){
  const prevPrice=price;
  price=Math.round(livePrice*100)/100;
  const inp=_getPriceInp();
  if(inp){
    inp.value=price;
    // Flash animation on price change
    if(Math.abs(price-prevPrice)>0.01){
      inp.classList.remove('price-flash-up','price-flash-dn');
      void inp.offsetWidth; // force reflow
      inp.classList.add(price>prevPrice?'price-flash-up':'price-flash-dn');
    }
  }
  _showLiveBadge(isLive);
  const change=livePrice-prevClose;
  const changePct=prevClose?(change/prevClose*100):0;
  const chEl=_getPriceChange();
  if(chEl){
    const sign=change>=0?'+':'';
    const arrow=change>=0?'▲':'▼';
    chEl.innerHTML=`<span style="font-size:11px;">${arrow}</span> ${sign}${change.toFixed(2)} (${sign}${changePct.toFixed(2)}%)`;
    chEl.style.color=change>=0?'#16a34a':'#dc2626';
  }
  _lastPriceTs=Date.now();
  recalc();
}

// Source 1: Yahoo Finance via allorigins
async function _fetchYahoo(ticker){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const r=await fetch(proxy,{signal:AbortSignal.timeout(6000)});
  if(!r.ok) throw new Error('allorigins error');
  const d=await r.json();
  const parsed=JSON.parse(d.contents);
  const meta=parsed?.chart?.result?.[0]?.meta;
  if(!meta) throw new Error('no meta');
  const live=meta.regularMarketPrice||meta.previousClose;
  const prev=meta.previousClose||live;
  const isLive=(meta.marketState==='REGULAR'||meta.marketState==='POST');
  return{live,prev,isLive};
}

// Source 2: Yahoo Finance v11 (alternative endpoint)
async function _fetchYahooV2(ticker){
  const url=`https://query2.finance.yahoo.com/v11/finance/quoteSummary/${ticker}?modules=price`;
  const proxy=`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  const r=await fetch(proxy,{signal:AbortSignal.timeout(6000)});
  if(!r.ok) throw new Error('v2 error');
  const d=await r.json();
  const p=JSON.parse(d.contents)?.quoteSummary?.result?.[0]?.price;
  if(!p) throw new Error('no price obj');
  const live=p.regularMarketPrice?.raw||p.previousClose?.raw;
  const prev=p.previousClose?.raw||live;
  if(!live) throw new Error('no price');
  const isLive=(p.marketState==='REGULAR');
  return{live,prev,isLive};
}

async function fetchLivePrice(){
  const coKey=Object.keys(DB).find(k=>DB[k]===co)||'MSFT';
  const ticker=YF_TICKER[coKey]||co.ticker;

  // Use cache if fresh (< 60s) and not first load
  if(_priceCache[coKey] && (Date.now()-_priceCache[coKey].ts)<60000){
    const c=_priceCache[coKey];
    _applyPrice(c.live,c.prev,c.isLive);
    return;
  }

  // Try source 1, fallback to source 2
  const sources=[_fetchYahoo,_fetchYahooV2];
  for(const src of sources){
    try{
      const {live,prev,isLive}=await src(ticker);
      _priceCache[coKey]={live,prev,isLive,ts:Date.now()};
      _applyPrice(live,prev,isLive);
      return;
    }catch(e){
      // try next
    }
  }
  // All failed — show manual indicator
  const b=_getLiveBadge();
  if(b){
    const txt=document.getElementById('live-text');
    if(txt) txt.textContent='MANUAL';
    b.classList.add('visible');b.style.background='#fef2f2';b.style.color='#dc2626';b.style.border='1px solid #fecaca';
    const dot=document.getElementById('live-dot');
    if(dot){dot.style.background='#dc2626';dot.style.animation='none';}
  }
  console.log('Live price unavailable for',ticker);
}

// Auto-refresh every 90 seconds during market hours
function startPriceRefresh(){
  if(_priceInterval) clearInterval(_priceInterval);
  _priceInterval=setInterval(()=>{
    const h=new Date().getUTCHours();
    // NYSE 9:30-16:00 ET = 13:30-20:00 UTC (roughly)
    if(h>=13&&h<=21) fetchLivePrice();
  },90000);
}

// ═══════════════════════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════════════════════
function calcDCF(){
  if(dr<=tg) return 0;
  let pv=0;
  for(let i=1;i<=10;i++) pv+=(co.fcf[9]*Math.pow(1+gr/100,i))/Math.pow(1+dr/100,i);
  const tv=(co.fcf[9]*Math.pow(1+gr/100,10)*(1+tg/100))/(dr/100-tg/100);
  return (pv+tv/Math.pow(1+dr/100,10)-co.netDebt[9])/co.shares;
}
function calcMult(){
  const nd=co.netDebt[9],sh=co.shares;
  const f=(co.fcf[9]*tEVF-nd)/sh;
  const p=co.eps[9]*tPER;                     // PER ex Cash: uses EPS adjusted
  const e=(co.ebitda[9]*tEVE-nd)/sh;
  const ei=(co.ebit[9]*tEVEI-nd)/sh;          // EV/EBIT
  return{f,p,e,ei,avg:(f+p+e+ei)/4};
}
function calcISModel(){
  const rows=[];let ps=co.sales[9],psh=co.shares;
  // ebitdaM implied from ebitM: ratio from last known year
  const ebitdaEbitRatio=(co.ebitdaM[9]/Math.max(co.ebitM[9],1));
  for(let i=0;i<5;i++){
    const s=ps*(1+isSG[i]/100);
    const ebit=s*isEM[i]/100;           // isEM now = EBIT margin
    const eb=ebit*ebitdaEbitRatio;      // EBITDA derived
    const nopat=ebit*(1-isTR[i]/100);
    const cx=s*isCX[i]/100;
    const dwc=(s-ps)*Math.abs(isWC[i])/100*(isWC[i]<0?1:-1);
    const fcf=nopat+(eb-ebit)-cx+dwc;  // D&A addback = eb-ebit
    const sh=psh*(1+isDI[i]/100);
    const nd=Math.max(0,(rows[i-1]?.nd??co.netDebt[9])-fcf*0.3);
    rows.push({yr:co.pY[i],s,eb,ebit,fcf,eps:nopat/sh,sh,nd,em:isEM[i],ebm:eb/s*100,fm:fcf/s*100});
    ps=s;psh=sh;
  }return rows;
}
function calcMoat(){
  const r9=co.roic[9],rt=co.roic[9]-co.roic[0],sg=cagr(co.sales[9],co.sales[0],9);
  const fm=co.fcfM[9],dd=co.netDebt[9]/co.ebitda[9],cx=co.isD.cx[0];
  const t=co.ticker;
  // Switching cost / moat score by company
  const switchScore=t==='ASML.AS'?98:t==='CSU.TO'?95:t==='MSFT'?88:t==='AAPL'?85:t==='NVDA'?80:t==='GOOGL'?82:t==='META'?65:t==='AMZN'?70:60;
  const switchWhy=t==='ASML.AS'?'Único fabricante EUV del mundo. Sin sustituto posible.':t==='CSU.TO'?'VMS crítico. Cambiar = meses de riesgo operativo.':t==='MSFT'?'Azure + M365 + Teams integrados. Costes de cambio altísimos.':t==='AAPL'?'Ecosistema cerrado: iPhone+Mac+Watch+AirPods. Lock-in extremo.':t==='NVDA'?'CUDA + arquitectura dominante. Sin alternativa equivalente en IA.':t==='GOOGL'?'Hábito de uso + red de publicidad. 90%+ cuota en Search.':t==='META'?'Efecto red 3.3B usuarios. Instagram+WhatsApp+Facebook.':'AWS + Prime + Marketplace. Costes de cambio moderados.';
  // Capital allocation
  const capAlloc=t==='CSU.TO'?90:t==='MSFT'?82:t==='AAPL'?88:t==='ASML.AS'?78:t==='NVDA'?75:t==='GOOGL'?72:t==='META'?70:65;
  const capWhy=t==='CSU.TO'?'81% FCF en adquisiciones a 3-7x EBITDA desde 1995.':t==='MSFT'?'Recompras masivas + dividendos crecientes 15 años + adquisiciones estratégicas.':t==='AAPL'?'$90B+ anuales en recompras. El mayor programa de buyback de la historia.':t==='ASML.AS'?'Dividendos crecientes + recompras selectivas.':t==='NVDA'?'Inversión en I+D + recompras crecientes.':t==='GOOGL'?'Buybacks masivos + inversión en IA/Cloud.':t==='META'?'Recompras agresivas + inversión en IA (Llama).':'Reinversión en AWS + logística + IA.';
  const items=[
    {n:"Switching costs / monopolio tecnológico",w:15,s:switchScore,why:switchWhy},
    {n:"CapEx / Ventas (ligereza de activos)",w:10,s:Math.min(100,Math.max(0,Math.round((1-cx/10)*100))),why:`CapEx/Ventas ${cx}%. ${cx<3?'Negocio extremadamente ligero en activos.':cx<7?'CapEx moderado, razonable para el sector.':'CapEx intensivo, penaliza conversión a FCF.'}`},
    {n:"Working Capital negativo",w:10,s:co.isD.wc[0]<-15?90:co.isD.wc[0]<-5?70:co.isD.wc[0]<0?50:35,why:`WC/Ventas ${co.isD.wc[0]}%. ${co.isD.wc[0]<-10?'Clientes pagan anticipado. Ventaja de financiación estructural.':co.isD.wc[0]<0?'Working capital ligeramente favorable.':'Working capital positivo, sin ventaja.'}`},
    {n:"ROIC vs coste de capital",w:15,s:r9>=50?100:r9>=30?92:r9>=20?82:r9>=15?68:r9>=10?50:25,why:`ROIC ${P(r9)} vs coste capital ~${co.wacc}%. Spread de ${(r9-co.wacc).toFixed(0)}pp. ${r9>=50?'Excepcional, clase mundial.':r9>=30?'Muy alto, ventaja competitiva clara.':r9>=20?'Sólido, destruye al mercado.':''}`},
    {n:"Tendencia ROIC 10 años",w:8,s:rt>=0?85:rt>=-10?55:rt>=-20?30:15,why:`De ${co.roic[0]}% (2016) a ${r9}% (2025). ${rt>=0?'Tendencia estable o creciente ✓':rt>=-10?'Bajista moderado, vigilar.':'Caída significativa.'}`},
    {n:"Margen FCF consistente",w:12,s:fm>=35?95:fm>=25?85:fm>=20?75:fm>=15?60:fm>=10?42:25,why:`Margen FCF ${P(fm)}.`},
    {n:"CAGR Ventas 10 años",w:12,s:sg>=40?98:sg>=25?90:sg>=20?82:sg>=15?70:sg>=10?55:35,why:`CAGR ${P(sg)}.`},
    {n:"Capital allocation / reinversión FCF",w:10,s:capAlloc,why:capWhy},
    {n:"Sin dilución accionarial",w:8,s:Math.max(0,100-Math.abs(co.isD.di[0])*15),why:`Dilución anual: ${co.isD.di[0]}%.`},
    {n:"Solidez balance (Deuda/EBITDA)",w:10,s:dd<0?100:dd<1?88:dd<2?68:dd<3?42:12,why:`Deuda/EBITDA ${dd.toFixed(1)}x.`},
  ];
  let tot=0,w=0;items.forEach(it=>{tot+=it.s*it.w;w+=it.w;});
  const ov=Math.round(tot/w);
  return{items,overall:ov,label:ov>=85?"MOAT EXCEPCIONAL":ov>=70?"MOAT SÓLIDO":ov>=55?"MOAT MODERADO":"MOAT DÉBIL",color:ov>=85?"#16a34a":ov>=70?"#0891b2":ov>=55?"#d97706":"#dc2626"};
}

function recalc(){
  // Sync price from whichever input was edited
  const hdrInp=document.getElementById('price-inp');
  const valInp=document.getElementById('val-price-inp');
  // Use active element value if it's one of the price inputs
  const active=document.activeElement;
  if(active&&active.id==='val-price-inp') price=+active.value||co.price;
  else if(active&&active.id==='price-inp') price=+active.value||co.price;
  // Keep both inputs in sync
  if(hdrInp&&active!==hdrInp) hdrInp.value=N(price,2);
  if(valInp&&active!==valInp) valInp.value=N(price,2);

  const dcf=calcDCF(),mult=calcMult();
  const ud=(dcf-price)/price*100,um=(mult.avg-price)/price*100,ms=Math.min(ud,um);
  const verd=ms>20?"COMPRAR":ms>-5?"MANTENER":"EVITAR",vc=cu(ms);

  // Header veredicto
  const vv=document.getElementById('vval'),vm=document.getElementById('vms'),vb=document.getElementById('vbox');
  if(vv){vv.textContent=verd;vv.style.color=vc;}
  if(vm){vm.textContent='MdS: '+ms.toFixed(1)+'%';vm.style.color=vc;}
  if(vb) vb.style.borderColor=vc;

  // Market cap
  const mc=price*co.shares;
  const mcd=document.getElementById('mktcap-display');
  const mcs=document.getElementById('mktcap-sub');
  if(mcd) mcd.textContent=mc>=1e12?'$'+(mc/1e12).toFixed(2)+'T':mc>=1e9?'$'+(mc/1e9).toFixed(1)+'B':'$'+N(Math.round(mc/1e6))+'M';
  if(mcs) mcs.textContent='EV/FCF: '+Math.round((price*co.shares+co.netDebt[9])/co.fcf[9])+'x';

  // Update valoracion tab DOM without re-rendering
  _refreshValDOM(dcf,mult,ms,vc,verd,ud);
}

function _refreshValDOM(dcf,mult,ms,vc,verd,ud){
  // Price input color
  const valInp=document.getElementById('val-price-inp');
  if(valInp) valInp.style.color=vc;
  // Veredicto badge
  const vbox=document.getElementById('val-verd-box');
  if(vbox){
    vbox.style.background=vc+'12';vbox.style.borderColor=vc+'40';
    const vt=vbox.querySelector('.val-verd-txt');
    const vs=vbox.querySelector('.val-verd-sub');
    if(vt){vt.textContent=verd;vt.style.color=vc;}
    if(vs){vs.textContent='MdS '+(ms>=0?'+':'')+ms.toFixed(1)+'%';vs.style.color=vc;}
  }
  // DCF summary in zone 3
  const dcfEl=document.getElementById('val-dcf-val');
  if(dcfEl){dcfEl.textContent='DCF: $'+N(dcf)+' ('+(ud>=0?'+':'')+ud.toFixed(1)+'%)';}
  // Refresh multiples tiles
  _refreshMultTiles();
  // Refresh price target table
  _refreshPriceTable();
  // Refresh CAGR
  _refreshCagrRow();
  // Refresh retorno objetivo
  _refreshRetorno();
}

function _refreshMultTiles(){
  const me2=(co.medEvEbit||(Math.round(co.medEvEbitda*co.ebitdaM[9]/Math.max(co.ebitM[9],1))));
  const tiles=[
    {id:'mt-evfcf', v:+((price*co.shares+co.netDebt[9])/co.fcf[9]).toFixed(1),   m:co.medEvFcf,    c:'#b45309'},
    {id:'mt-per',   v:+(price/co.eps[9]).toFixed(1),                             m:co.medPER,      c:'#7c3aed'},
    {id:'mt-eveb',  v:+((price*co.shares+co.netDebt[9])/co.ebitda[9]).toFixed(1),m:co.medEvEbitda, c:'#2563eb'},
    {id:'mt-evei',  v:+((price*co.shares+co.netDebt[9])/co.ebit[9]).toFixed(1),  m:me2,            c:'#16a34a'},
  ];
  tiles.forEach(t=>{
    const el=document.getElementById(t.id);
    if(!el) return;
    const pct=((t.v-t.m)/t.m*100);
    const ok=pct<=0;
    el.style.background=ok?'#f0fdf4':'#fef2f2';
    el.style.borderColor=ok?'#bbf7d0':'#fecaca';
    el.querySelector('.mt-val').textContent=t.v+'x';
    el.querySelector('.mt-val').style.color=t.c;
    el.querySelector('.mt-pct').textContent=(pct>=0?'+':'')+pct.toFixed(0)+'%';
    el.querySelector('.mt-pct').style.color=ok?'#16a34a':'#dc2626';
  });
}

function _refreshPriceTable(){
  const isM=calcISModel();
  const rows={
    'ptr-per':  isM.map(m=>Math.round(m.eps*tPER)),
    'ptr-evf':  isM.map(m=>Math.round((m.fcf*tEVF-m.nd)/m.sh)),
    'ptr-eveb': isM.map(m=>Math.round((m.eb*tEVE-m.nd)/m.sh)),
    'ptr-evei': isM.map(m=>Math.round((m.ebit*tEVEI-m.nd)/m.sh)),
  };
  rows['ptr-avg']=rows['ptr-evf'].map((_,i)=>Math.round((rows['ptr-per'][i]+rows['ptr-evf'][i]+rows['ptr-eveb'][i]+rows['ptr-evei'][i])/4));

  Object.entries(rows).forEach(([rowId,data])=>{
    const isEVF=rowId==='ptr-evf';
    data.forEach((v,i)=>{
      const cell=document.getElementById(rowId+'-'+i);
      if(!cell) return;
      const up=(v-price)/price*100;
      const ptv=cell.querySelector('.ptv');
      const ptp=cell.querySelector('.ptp');
      if(ptv){
        ptv.textContent='$'+N(v);
        ptv.style.color=up>15?'#16a34a':up>0?'#2563eb':up>-15?'#d97706':'#dc2626';
        if(isEVF) ptv.style.fontSize='13px';
      }
      if(ptp){
        ptp.textContent=(up>=0?'+':'')+up.toFixed(0)+'%';
        ptp.style.color=up>=0?'#16a34a':'#dc2626';
      }
    });
    // MdS and Potencial rows (EV/FCF only)
    if(isEVF){
      data.forEach((v,i)=>{
        const mds=document.getElementById('ptr-mds-'+i);
        const pot=document.getElementById('ptr-pot-'+i);
        if(mds){const p=(v-price)/price*100;mds.textContent=(p>=0?'+':'')+p.toFixed(0)+'%';mds.style.color=p>=0?'#16a34a':'#dc2626';}
        if(pot){const p=(v/price-1)*100;pot.textContent=(p>=0?'+':'')+p.toFixed(0)+'%';pot.style.color=p>=0?'#16a34a':'#dc2626';}
      });
    }
  });
}

function _refreshCagrRow(){
  const isM=calcISModel();
  const models={
    'cagr-per': isM.map((m,i)=>(Math.pow(Math.max(m.eps*tPER,1)/Math.max(price,1),1/(i+1))-1)*100),
    'cagr-evf': isM.map((m,i)=>(Math.pow(Math.max((m.fcf*tEVF-m.nd)/m.sh,1)/Math.max(price,1),1/(i+1))-1)*100),
    'cagr-eveb':isM.map((m,i)=>(Math.pow(Math.max((m.eb*tEVE-m.nd)/m.sh,1)/Math.max(price,1),1/(i+1))-1)*100),
    'cagr-evei':isM.map((m,i)=>(Math.pow(Math.max((m.ebit*tEVEI-m.nd)/m.sh,1)/Math.max(price,1),1/(i+1))-1)*100),
  };
  // avg
  models['cagr-avg']=isM.map((m,i)=>{
    const p=(m.eps*tPER+(m.fcf*tEVF-m.nd)/m.sh+(m.eb*tEVE-m.nd)/m.sh+(m.ebit*tEVEI-m.nd)/m.sh)/4;
    return(Math.pow(Math.max(p,1)/Math.max(price,1),1/(i+1))-1)*100;
  });
  const ccol=v=>v>=20?'#16a34a':v>=10?'#d97706':'#dc2626';
  Object.entries(models).forEach(([id,data])=>{
    // Use last year (5Y) for the row display
    const v5=data[4];
    const el=document.getElementById(id+'-5y');
    if(el){el.textContent=(v5>=0?'+':'')+v5.toFixed(0)+'%';el.style.color=ccol(v5);}
  });
  // Big CAGR display
  const bigCagr=document.getElementById('cagr-big');
  if(bigCagr){
    const avg5=models['cagr-avg'][4];
    bigCagr.textContent=(avg5>=0?'+':'')+avg5.toFixed(0)+'%';
    bigCagr.style.color=ccol(avg5);
  }
}

function _refreshRetorno(){
  const idx=Math.min(hor,5)-1;
  const isM=calcISModel();
  const rowEVF=isM.map(m=>Math.round((m.fcf*tEVF-m.nd)/m.sh));
  const priceForRet=Math.round(rowEVF[idx]/Math.pow(1+ret/100,idx+1));
  const diff=((priceForRet-price)/price*100);
  const el=document.getElementById('ret-price');
  const el2=document.getElementById('ret-diff');
  if(el) el.textContent='$'+N(priceForRet);
  if(el2){el2.textContent=(diff>=0?'+':'')+diff.toFixed(0)+'%';el2.style.color=cu(diff);}
}

function showTab(tab){
  curTab=tab;
  document.querySelectorAll('.tab').forEach(t=>{
    const act=t.dataset.t===tab;
    t.classList.toggle('active',act);
    t.style.color=act?co.color:'';
    t.style.borderBottomColor=act?co.color:'transparent';
  });
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const el=document.getElementById('cnt');
  if(tab==='resumen') el.innerHTML=rResumen();
  else if(tab==='graficos') el.innerHTML=rGraficos();
  else if(tab==='valoracion') el.innerHTML=rValoracion();
  else if(tab==='proyecciones') el.innerHTML=rProyecciones();
  else if(tab==='moat') el.innerHTML=rMoat();
  else if(tab==='dcf') el.innerHTML=rDCF();
  else if(tab==='academia') el.innerHTML=rAcademia();
  else if(tab==='tesis') el.innerHTML=rTesis();
  else if(tab==='noticias') el.innerHTML=rNoticias();
  else if(tab==='alertas') el.innerHTML=rAlertas();
  injectTips();
  setTimeout(()=>buildCharts(tab),120);
}

function sld(id,lbl,val,min,max,step,unit,color,hint){
  return`<div class="slrow">
    <div class="sllbl"><span>${lbl}</span>
      <div style="display:flex;align-items:center;gap:5px;">
        <input type="number" value="${val}" class="numinp" style="color:${color};border-color:${color}40;" onchange="${id}=+this.value;document.getElementById('r${id}').value=+this.value;recalc()"/>
        <span style="font-size:11px;color:var(--muted)">${unit}</span>
      </div>
    </div>
    <input type="range" id="r${id}" min="${min}" max="${max}" step="${step}" value="${val}" style="accent-color:${color}" oninput="${id}=+this.value;this.previousElementSibling.querySelector('input').value=this.value;recalc()"/>
    ${hint?`<div class="sh">💡 ${hint}</div>`:''}
  </div>`;
}

function toggleKpi(key){
  const el=document.getElementById(`kpi-expand-${key}`);
  const kpi=document.getElementById(`kpi-${key}`);
  if(!el||!kpi) return;
  const open=el.classList.contains('open');
  // Close all
  document.querySelectorAll('.kpi-expand.open').forEach(e=>e.classList.remove('open'));
  document.querySelectorAll('.kpi.expanded').forEach(e=>e.classList.remove('expanded'));
  if(!open){el.classList.add('open');kpi.classList.add('expanded');}
}

let _multChartInst=null;
let _multVisible={evfcf:true,per:false,evebitda:false,evebit:false};

function toggleMultSeries(key){
  _multVisible[key]=!_multVisible[key];
  const btn=document.getElementById('btn-'+key);
  const colors={evfcf:'#b45309',per:'#7c3aed',evebitda:'#2563eb',evebit:'#16a34a'};
  if(btn){
    if(_multVisible[key]){
      btn.style.background=colors[key];btn.style.borderColor=colors[key];btn.style.color='#fff';
    }else{
      btn.style.background='transparent';btn.style.borderColor='var(--border)';btn.style.color='var(--muted)';
    }
  }
  buildMultHistChart();
}

function buildMultHistChart(){
  const existing=Chart.getChart('c-mult-hist');
  if(existing) existing.destroy();
  if(_multChartInst){try{_multChartInst.destroy();}catch(e){} _multChartInst=null;}

  const c=document.getElementById('c-mult-hist');
  if(!c) return;
  const gc='rgba(0,0,0,0.04)',tc='#9a958e';
  const n=co.years.length;
  const labels=co.years.map(String);

  // Current year multiples
  const curPER    =+(price/co.eps[9]).toFixed(1);
  const curEvF    =+((price*co.shares+co.netDebt[9])/co.fcf[9]).toFixed(1);
  const curEvEB   =+((price*co.shares+co.netDebt[9])/co.ebitda[9]).toFixed(1);
  const curEvEBIT =+((price*co.shares+co.netDebt[9])/co.ebit[9]).toFixed(1);
  const medEvEBIT =co.medEvEbit||(Math.round(co.medEvEbitda*co.ebitdaM[9]/Math.max(co.ebitM[9],1)));

  function withCur(arr,cur){const a=[...arr];a[a.length-1]=cur;return a;}

  const series={
    evfcf:{label:'EV/FCF',    data:withCur(co.hEvF,   curEvF),    color:'#b45309', med:co.medEvFcf},
    per:  {label:'PER',       data:withCur(co.hPER,   curPER),    color:'#7c3aed', med:co.medPER},
    evebitda:{label:'EV/EBITDA',data:withCur(co.hEvEbitda||Array(n).fill(null),curEvEB),color:'#2563eb',med:co.medEvEbitda},
    evebit:{label:'EV/EBIT',  data:withCur(co.hEvEbit||Array(n).fill(null),curEvEBIT),color:'#16a34a',med:medEvEBIT},
  };

  const datasets=[];
  Object.entries(series).forEach(([k,s])=>{
    if(!_multVisible[k]) return;
    // Main line
    datasets.push({
      label:s.label,
      data:s.data,
      borderColor:s.color,
      backgroundColor:s.color,
      pointRadius:s.data.map((_,i)=>i===n-1?5:3),
      pointBackgroundColor:s.data.map((_,i)=>i===n-1?'#fff':s.color),
      pointBorderColor:s.color,
      pointBorderWidth:s.data.map((_,i)=>i===n-1?2.5:1.5),
      borderWidth:2.5,tension:.3,spanGaps:true,fill:false,order:2
    });
    // Median line (dashed)
    datasets.push({
      label:`Med. ${s.label} ${s.med}x`,
      data:Array(n).fill(s.med),
      borderColor:s.color,
      borderWidth:1.5,
      borderDash:[5,4],
      pointRadius:0,
      fill:false,order:1,tension:0,
      spanGaps:true
    });
  });

  if(datasets.length===0) return;

  _multChartInst=new Chart(c,{
    type:'line',
    data:{labels,datasets},
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          display:true,position:'top',
          labels:{font:{size:9},boxWidth:10,padding:8,usePointStyle:true,
            filter:item=>!item.text.startsWith('Med.')
          }
        },
        tooltip:{
          backgroundColor:'rgba(255,255,255,.97)',
          borderColor:'#e4e0d8',borderWidth:1,
          titleColor:'#1a1814',bodyColor:'#5a5650',padding:10,
          callbacks:{
            title:items=>'Año '+items[0].label,
            label:ctx=>ctx.raw!=null?` ${ctx.dataset.label}: ${ctx.raw}x`:null
          }
        }
      },
      scales:{
        x:{grid:{color:gc},ticks:{color:tc,font:{size:9},maxRotation:0}},
        y:{grid:{color:gc},ticks:{color:tc,font:{size:9},callback:v=>v+'x'},
           suggestedMin:0,
           title:{display:true,text:'Múltiplo (x)',color:tc,font:{size:9}}
        }
      }
    }
  });

  // ── Refresh price tiles ──
  // Refresh val-price-bar if on valoracion tab
  const vpPrice=document.getElementById('vp-price');
  if(vpPrice) vpPrice.textContent='$'+N(price,2);
  const vpFV=document.getElementById('vp-fv');
  if(vpFV){const m=calcMult();const fv=Math.round(m.avg);const up=(fv-price)/price*100;vpFV.textContent='$'+N(fv);vpFV.style.color=up>0?'#16a34a':'#dc2626';}
  const pv=document.getElementById('mult-price-val');
  if(pv) pv.textContent=N(price,2);
  const ratiosEl=document.getElementById('mult-live-ratios');
  if(ratiosEl){
    const rats=[
      {l:'EV/FCF',   v:curEvF,   m:co.medEvFcf,    c:'#b45309'},
      {l:'PER',      v:curPER,   m:co.medPER,      c:'#7c3aed'},
      {l:'EV/EBITDA',v:curEvEB,  m:co.medEvEbitda, c:'#2563eb'},
      {l:'EV/EBIT',  v:curEvEBIT,m:medEvEBIT,      c:'#16a34a'},
    ];
    ratiosEl.style.gridTemplateColumns='repeat(4,1fr)';
    ratiosEl.innerHTML=rats.map(r=>{
      const pct2=((r.v-r.m)/r.m*100);
      const col=pct2<=0?'#16a34a':'#dc2626';
      return`<div style="background:#fff;border-radius:8px;padding:5px 8px;border:1.5px solid ${col}35;min-width:62px;">
        <div style="font-size:8px;color:var(--muted);text-transform:uppercase;font-weight:700;">${r.l}</div>
        <div style="font-size:14px;font-weight:800;color:${r.c};">${r.v}x</div>
        <div style="font-size:9px;font-weight:700;color:${col};">${pct2>=0?'+':''}${pct2.toFixed(0)}% vs med.</div>
      </div>`;
    }).join('');
  }
  const fvEl=document.getElementById('mult-fv-display');
  const fvUp=document.getElementById('mult-fv-upside');
  if(fvEl){
    const mult_=calcMult();
    const fv=Math.round(mult_.avg);
    const up=(fv-price)/price*100;
    fvEl.textContent='$'+N(fv);
    fvEl.style.color=up>0?'#16a34a':'#dc2626';
    if(fvUp){fvUp.textContent=(up>0?'+':'')+up.toFixed(1)+'%';fvUp.style.color=up>0?'#16a34a':'#dc2626';}
  }
}

function refreshMultHist(){
  const panel=document.getElementById('mult-hist-panel');

function rPriceSimulator(){
  const sp=getSimPrice();
  const isSimulating=simPrice!=null;
  const chg=((sp-price)/price*100);

  // Compute all metrics at simulated price
  const evfcf_s=Math.round((sp*co.shares+co.netDebt[9])/co.fcf[9]*10)/10;

  const evebitda_s=Math.round((sp*co.shares+co.netDebt[9])/co.ebitda[9]*10)/10;

  // DCF upside at simulated price
  const dcf_v=calcDCF();
  const mult_v=calcMult();
  const up_dcf=(dcf_v-sp)/sp*100;
  const up_mult=(mult_v.avg-sp)/sp*100;
  const up_evfcf=(mult_v.f-sp)/sp*100;
  const up_per=(mult_v.p-sp)/sp*100;
  const ms_s=Math.min(up_dcf,up_mult);
  const sem=_semLight(ms_s);

  // Price zones: 5 levels based on multiples targets
  const p_bear=Math.round((co.pF[0]*Math.round(co.medEvFcf*0.45)-co.pND[0])/co.shares);
  const p_cons=Math.round((co.pF[0]*Math.round(co.medEvFcf*0.65)-co.pND[0])/co.shares);
  const p_base=Math.round((co.pF[0]*Math.round(co.medEvFcf*0.82)-co.pND[0])/co.shares);
  const p_opt=Math.round((co.pF[0]*co.medEvFcf-co.pND[0])/co.shares);
  const p_bull=Math.round((co.pF[0]*(co.medEvFcf*1.25)-co.pND[0])/co.shares);
  const zones=[
    {p:p_bear,lbl:'Pesimista',bg:'#fef2f2',border:'#fecaca',tc:'#dc2626'},
    {p:p_cons,lbl:'Conserv.',bg:'#fff7ed',border:'#fdba74',tc:'#ea580c'},
    {p:p_base,lbl:'Base',bg:'#fffbeb',border:'#fde68a',tc:'#d97706'},
    {p:p_opt, lbl:'Optimista',bg:'#f0fdf4',border:'#bbf7d0',tc:'#16a34a'},
    {p:p_bull,lbl:'Euforia',bg:'#f0fdfa',border:'#99f6e4',tc:'#0d9488'},
  ];

  // Metrics comparison table
  const metrics=[
    {lbl:'EV/FCF',sim:evfcf_s,ref:co.medEvFcf,unit:'x',color:'#b45309',good:v=>v<=co.medEvFcf},
    {lbl:'PER',sim:per_s,ref:co.medPER,unit:'x',color:'#7c3aed',good:v=>v<=co.medPER},
    {lbl:'EV/EBITDA',sim:evebitda_s,ref:co.medEvEbitda,unit:'x',color:'#2563eb',good:v=>v<=co.medEvEbitda},
    {lbl:'Mkt Cap',sim:mktcap_s+'B',ref:'—',unit:'',color:'#1e3a5f',good:()=>true},
  ];

  return`<div class="card psim-wrap" style="border-color:${isSimulating?'#2563eb':'var(--border)'};${isSimulating?'background:#eff6ff08;':''}">

      ${isSimulating?`<button onclick="simPrice=null;document.getElementById('psim-inp').value='';refreshSimulator();" style="font-size:10px;padding:3px 10px;border-radius:14px;border:1.5px solid #2563eb;color:#2563eb;background:#eff6ff;cursor:pointer;font-weight:700;">✕ Volver al precio real ($${N(price)})</button>`:''}

    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">¿Qué pasaría si el precio fuera…? Introduce un precio hipotético y ve todos los ratios en tiempo real.</div>

      <span style="font-size:13px;color:var(--muted);font-weight:600;">$</span>
      <input id="psim-inp" class="psim-inp" type="number" placeholder="${N(price)}" value="${isSimulating?sp:''}"
        oninput="simPrice=this.value&&+this.value>0?+this.value:null;refreshSimulator();"
        style="border-color:${isSimulating?'#2563eb':'var(--border)'}"/>
      ${isSimulating?`<span class="psim-badge" style="background:${chg>=0?'#f0fdf4':'#fef2f2'};color:${chg>=0?'#16a34a':'#dc2626'};border:1px solid ${chg>=0?'#bbf7d0':'#fecaca'};">${chg>=0?'▲':'▼'} ${chg>=0?'+':''}${chg.toFixed(1)}% vs actual</span>`:''}
    </div>

    ${isSimulating?`
    <!-- Semáforo veredicto -->
    <div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:12px;background:${sem.bg};border:1.5px solid ${sem.border};">

      <div style="flex:1;">
        <div style="font-size:11px;color:${sem.text};font-weight:600;">Margen de seguridad a $${N(sp)}: ${ms_s.toFixed(1)}%</div>

      </div>
    </div>

    <!-- KPIs grid -->
    <div class="psim-grid" style="margin-bottom:12px;">
      ${metrics.map(m=>{
        const isGood=typeof m.good==='function'?m.good(parseFloat(m.sim)):true;
        const bg=isGood?'#f0fdf4':'#fef2f2';
        const bd=isGood?'#bbf7d0':'#fecaca';
        const tc2=isGood?'#16a34a':'#dc2626';
        return`<div class="psim-kpi" style="background:${bg};border-color:${bd};">
          <div class="psim-kpi-lbl">${m.lbl}</div>
          <div class="psim-kpi-val" style="color:${m.color};">${m.sim}${m.unit}</div>
          ${m.ref!=='—'?`<div class="psim-kpi-sub" style="color:${tc2};">med. hist: ${m.ref}${m.unit} ${isGood?'✓ bajo media':'▲ sobre media'}</div>`:''}
        </div>`;
      }).join('')}
    </div>

    <!-- Upside cards -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;">
      ${[{l:'Upside EV/FCF',v:up_evfcf,c:'#b45309'},{l:'Upside PER',v:up_per,c:'#7c3aed'},{l:'Upside DCF',v:up_dcf,c:'#2563eb'},{l:'Marg. Seguridad',v:ms_s,c:ms_s>0?'#16a34a':'#dc2626'}].map(u=>`
      <div style="background:#f7f6f3;border-radius:8px;padding:8px;text-align:center;border-top:2.5px solid ${u.v>0?'#16a34a':'#dc2626'};">
        <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;">${u.l}</div>
        <div style="font-size:16px;font-weight:800;color:${u.v>0?'#16a34a':'#dc2626'};margin-top:2px;">${u.v>0?'+':''}${u.v.toFixed(1)}%</div>
      </div>`).join('')}
    </div>`:''}

    <!-- Semáforo de zonas de precio -->
    <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;">🚦 Zonas de precio (2026E)</div>
    <div class="psim-semaforo">
      ${zones.map(z=>{
        const up2=((z.p-price)/price*100);
        const isCur=isSimulating&&Math.abs(sp-z.p)<z.p*0.08;
        return`<div class="psim-zone" style="background:${z.bg};border:${isCur?'2px solid '+z.tc:'1px solid '+z.border};"
          onclick="simPrice=${z.p};document.getElementById('psim-inp').value=${z.p};refreshSimulator();">
          <div class="psim-zone-price" style="color:${z.tc};">$${N(z.p)}</div>
          <div class="psim-zone-lbl" style="color:${z.tc};">${z.lbl}</div>
          <div class="psim-zone-upside" style="color:${up2>=0?'#16a34a':'#dc2626'};">${up2>=0?'+':''}${up2.toFixed(0)}%</div>
        </div>`;
      }).join('')}
    </div>
    <div style="font-size:9px;color:var(--muted);margin-top:5px;">Haz clic en una zona para simular ese precio.</div>
  </div>`;
}

function refreshSimulator(){
  const el=document.getElementById('price-sim-container');
  if(el) el.innerHTML=rPriceSimulator();
}

          <div>
            <div style="font-size:9px;color:var(--muted);text-transform:uppercase;margin-bottom:2px;">Precio de compra para ${ret}% anual (EV/FCF, ${hor}a)</div>

          </div>

function rDCF(){
  const dcf=calcDCF();
  const ud=(dcf-price)/price*100;
  return`<div class="two-col">
  <div>

    <!-- SIMULADOR DE PRECIO -->
    <div class="card">
      <div class="ctitle">🔮 Simulador de Precio</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">Introduce un precio hipotético y ve todos los ratios recalculados. O haz clic en una zona para simularla.</div>

      <!-- Input row -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <div style="flex:1;min-width:140px;">
          <div style="font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Precio a simular</div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:14px;color:var(--muted);font-weight:600;">$</span>
            <input id="sim-inp-dcf" type="number" placeholder="${N(price)}"
              style="width:110px;padding:8px 10px;border:2px solid var(--border);border-radius:9px;font-size:18px;font-weight:700;color:#1e3a5f;outline:none;text-align:center;transition:border-color .15s;"
              oninput="simPrice=this.value&&+this.value>0?+this.value:null;refreshDCFSim();"
              onfocus="this.style.borderColor='#2563eb'"
              onblur="this.style.borderColor=simPrice?'#2563eb':'var(--border)'"
            />
            ${simPrice!=null?`<button onclick="simPrice=null;document.getElementById('sim-inp-dcf').value='';refreshDCFSim();" style="padding:6px 12px;border-radius:8px;border:1.5px solid #2563eb;color:#2563eb;background:#eff6ff;cursor:pointer;font-size:11px;font-weight:700;">✕ Reset</button>`:''}
          </div>
        </div>
        <div id="sim-verdict-badge" style="padding:8px 14px;border-radius:10px;background:#f7f6f3;border:1px solid var(--border);font-size:12px;font-weight:700;color:var(--muted);">
          ${simPrice==null?'← Introduce un precio':''}
        </div>
      </div>

      <!-- Live ratios at sim price -->
      <div id="sim-ratios-grid" style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;">
        ${(()=>{
          const sp=simPrice??price;
          const rats=[
            {l:'EV/FCF',   v:+((sp*co.shares+co.netDebt[9])/co.fcf[9]).toFixed(1),   m:co.medEvFcf,    c:'#b45309'},
            {l:'PER',      v:+(sp/co.eps[9]).toFixed(1),                              m:co.medPER,      c:'#7c3aed'},
            {l:'EV/EBITDA',v:+((sp*co.shares+co.netDebt[9])/co.ebitda[9]).toFixed(1),m:co.medEvEbitda, c:'#2563eb'},
            {l:'EV/EBIT',  v:+((sp*co.shares+co.netDebt[9])/co.ebit[9]).toFixed(1),  m:co.medEvEbit||(Math.round(co.medEvEbitda*co.ebitdaM[9]/Math.max(co.ebitM[9],1))), c:'#16a34a'},
          ];
          return rats.map(r=>{
            const pct=((r.v-r.m)/r.m*100);
            const col=pct<=0?'#16a34a':'#dc2626';
            const bg=pct<=0?'#f0fdf4':'#fef2f2';
            const bd=pct<=0?'#bbf7d0':'#fecaca';
            return`<div style="background:${bg};border:1.5px solid ${bd};border-radius:10px;padding:10px 12px;">
              <div style="font-size:9px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:.04em;">${r.l}</div>
              <div style="display:flex;align-items:baseline;gap:6px;margin-top:3px;">
                <span style="font-size:20px;font-weight:800;color:${r.c};">${r.v}x</span>
                <span style="font-size:10px;font-weight:700;color:${col};">${pct>=0?'+':''}${pct.toFixed(0)}% vs med.</span>
              </div>
              <div style="font-size:10px;color:var(--muted);margin-top:2px;">mediana hist: ${r.m}x</div>
            </div>`;
          }).join('');
        })()}
      </div>

      <!-- Upside/downside summary -->
      ${(()=>{
        const sp=simPrice??price;
        const mult_=calcMult();
        const upDCF=(dcf-sp)/sp*100;
        const upMult=(mult_.avg-sp)/sp*100;
        const ms_=Math.min(upDCF,upMult);
        const col=ms_>20?'#16a34a':ms_>0?'#2563eb':ms_>-15?'#d97706':'#dc2626';
        const bg=ms_>20?'#f0fdf4':ms_>0?'#eff6ff':ms_>-15?'#fffbeb':'#fef2f2';
        const bd=ms_>20?'#bbf7d0':ms_>0?'#bfdbfe':ms_>-15?'#fde68a':'#fecaca';
        const label=ms_>20?'COMPRAR 🟢':ms_>0?'MANTENER 🔵':ms_>-15?'PRECAUCIÓN 🟡':'EVITAR 🔴';
        if(simPrice==null) return`<div style="padding:10px 12px;background:#f7f6f3;border-radius:10px;font-size:12px;color:var(--muted);text-align:center;">Introduce un precio para ver el análisis</div>`;
        return`<div style="background:${bg};border:1.5px solid ${bd};border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <div style="flex:1;">
            <div style="font-size:16px;font-weight:800;color:${col};">${label}</div>
            <div style="font-size:11px;color:${col};margin-top:3px;">A $${N(sp,2)} — MdS: ${ms_.toFixed(1)}%</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:180px;">
            ${[{l:'DCF Upside',v:upDCF},{l:'Múlt. Upside',v:upMult}].map(u=>`
            <div style="background:rgba(255,255,255,.6);border-radius:8px;padding:7px;text-align:center;">
              <div style="font-size:9px;color:var(--muted);text-transform:uppercase;">${u.l}</div>
              <div style="font-size:15px;font-weight:800;color:${u.v>=0?'#16a34a':'#dc2626'};">${u.v>=0?'+':''}${u.v.toFixed(1)}%</div>
            </div>`).join('')}
          </div>
        </div>`;
      })()}

      <!-- Price zones -->
      <div style="margin-top:14px;">
        <div style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">🚦 Zonas de precio 2026E — clic para simular</div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;">
          ${(()=>{
            const me2=(co.medEvEbit||(Math.round(co.medEvEbitda*co.ebitdaM[9]/Math.max(co.ebitM[9],1))));
            const zones=[
              {lbl:'Pesimista', mult:Math.round(co.medEvFcf*0.45), bg:'#fef2f2',bd:'#fecaca',tc:'#dc2626'},
              {lbl:'Conserv.',  mult:Math.round(co.medEvFcf*0.65), bg:'#fff7ed',bd:'#fdba74',tc:'#ea580c'},
              {lbl:'Base',      mult:Math.round(co.medEvFcf*0.82), bg:'#fffbeb',bd:'#fde68a',tc:'#d97706'},
              {lbl:'Optimista', mult:co.medEvFcf,                  bg:'#f0fdf4',bd:'#bbf7d0',tc:'#16a34a'},
              {lbl:'Euforia',   mult:Math.round(co.medEvFcf*1.25), bg:'#f0fdfa',bd:'#99f6e4',tc:'#0d9488'},
            ];
            return zones.map(z=>{
              const p_=Math.round((co.fcf[9]*z.mult-co.netDebt[9])/co.shares);
              const up=((p_-price)/price*100);
              const isActive=simPrice!=null&&Math.abs(simPrice-p_)<p_*0.05;
              return`<div onclick="simPrice=${p_};document.getElementById('sim-inp-dcf').value=${p_};refreshDCFSim();"
                style="background:${z.bg};border:${isActive?'2px solid '+z.tc:'1px solid '+z.bd};border-radius:9px;padding:8px 4px;text-align:center;cursor:pointer;transition:transform .1s;" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform=''">
                <div style="font-size:11px;font-weight:800;color:${z.tc};">$${N(p_)}</div>
                <div style="font-size:9px;font-weight:700;color:${z.tc};margin-top:1px;">${z.lbl}</div>
                <div style="font-size:10px;font-weight:700;color:${up>=0?'#16a34a':'#dc2626'};margin-top:2px;">${up>=0?'+':''}${up.toFixed(0)}%</div>
              </div>`;
            }).join('');
          })()}
        </div>
      </div>
    </div>

  </div>
  <div>

    <!-- DCF PARAMETERS + SENSITIVITY TABLES -->

function applyScenario(key,evf,per,eve,evei){
  tEVF=evf;tPER=per;tEVE=eve;tEVEI=evei;
  // Update hidden sliders
  ['tEVF','tPER','tEVE','tEVEI'].forEach(id=>{
    const sl=document.getElementById('r'+id);
    if(sl) sl.value=window[id];
  });
  // Update orange input cells
  const map={tEVF:evf,tPER:per,tEVE:eve,tEVEI:evei};
  Object.entries(map).forEach(([id,val])=>{
    const inp=document.getElementById('ni-'+id);
    if(inp){
      inp.value=val;
      // Flash animation to show the value changed
      inp.style.transition='background .15s';
      inp.style.background='#fef08a';
      setTimeout(()=>{if(inp) inp.style.background='#fff7e6';},350);
    }
  });
  // Active button styling
  const colors={opt:'#16a34a',base:'#2563eb',cons:'#d97706',pes:'#dc2626'};
  ['opt','base','cons','pes'].forEach(k=>{
    const btn=document.getElementById('scen-btn-'+k);
    if(!btn) return;
    const c=colors[k];
    if(k===key){
      btn.style.border='2.5px solid '+c;
      btn.style.boxShadow='0 2px 8px '+c+'35,inset 0 0 0 1px '+c+'25';
      btn.style.transform='scale(1.04)';
    } else {
      btn.style.border='2px solid '+c+'35';
      btn.style.boxShadow='none';
      btn.style.transform='scale(1)';
    }
  });
  recalc();
}

function clearScenBtn(){
  // Deactivate all scenario buttons when user edits manually
  const colors={opt:'#16a34a',base:'#2563eb',cons:'#d97706',pes:'#dc2626'};
  ['opt','base','cons','pes'].forEach(k=>{
    const btn=document.getElementById('scen-btn-'+k);
    if(btn){
      btn.style.border='2px solid '+colors[k]+'35';
      btn.style.boxShadow='none';
      btn.style.transform='scale(1)';
    }
  });
}

async function fetchFinnhubNews(){
  const btn=document.getElementById('n-btn-live');
  const out=document.getElementById('n-live');
  if(!finnhubApiKey){
    out.innerHTML=`<div style="padding:14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;font-size:12px;color:#dc2626;">⚠️ Introduce tu Finnhub API Key abajo para ver noticias en tiempo real.</div>`;
    out.style.display='block';return;
  }
  btn.disabled=true;btn.innerHTML='⏳ Cargando noticias…';
  const ticker=co.finnhubTicker;
  const from=new Date();from.setDate(from.getDate()-30);
  const fromStr=from.toISOString().split('T')[0];
  const toStr=new Date().toISOString().split('T')[0];
  try{
    const r=await fetch(`https://finnhub.io/api/v1/company-news?symbol=${ticker}&from=${fromStr}&to=${toStr}&token=${finnhubApiKey}`);
    const news=await r.json();
    if(!Array.isArray(news)||news.length===0){
      out.innerHTML=`<div style="padding:14px;font-size:12px;color:var(--muted);">No se encontraron noticias recientes para ${co.name}. Verifica tu API key o el ticker.</div>`;
    } else {
      const items=news.slice(0,8).map(n=>{
        const date=new Date(n.datetime*1000).toLocaleDateString('es-ES');
        const sentiment=n.sentiment||0;
        const sColor=sentiment>0.1?'#16a34a':sentiment<-0.1?'#dc2626':'#d97706';
        const sLabel=sentiment>0.1?'🟢 Positivo':sentiment<-0.1?'🔴 Negativo':'🟡 Neutro';
        return`<div class="news-item">
          <div class="news-headline"><a href="${n.url}" target="_blank" style="color:#1a1814;text-decoration:none;">${n.headline}</a></div>
          <div class="news-meta">
            <span style="font-weight:600;">${n.source}</span>
            <span>${date}</span>
            <span class="news-sentiment" style="background:${sColor}18;color:${sColor};">${sLabel}</span>
          </div>
          ${n.summary?`<div style="font-size:11px;color:var(--sub);margin-top:5px;line-height:1.5;">${n.summary.substring(0,150)}…</div>`:''}
        </div>`;
      }).join('');
      out.innerHTML=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Mostrando las últimas ${Math.min(news.length,8)} noticias de los últimos 30 días.</div>${items}`;
    }
    out.style.display='block';
  }catch(e){
    out.innerHTML=`<div style="padding:14px;background:#fef2f2;border:1px solid #fecaca;border-radius:10px;font-size:12px;color:#dc2626;">Error al cargar noticias. Comprueba tu API key y conexión.</div>`;
    out.style.display='block';
  }
  btn.disabled=false;btn.innerHTML='🔴 Noticias en Tiempo Real (Finnhub)';
}

function buildCharts(tab){
  const gc='rgba(0,0,0,0.06)',tc='#9a958e';
  const base={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false}},
    scales:{
      x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
      y:{grid:{color:gc},ticks:{color:tc,font:{size:10}}}
    }
  };

  if(tab==='graficos'){
    // Chart 1: Ventas + FCF + EPS (logarithmic for multi-scale)
    const aY=[...co.years,...co.pY];
    const aS=[...co.sales,...co.pS];
    const aF=[...co.fcf,...co.pF];
    const aEPS=[...co.eps,...co.pEPS];
    const c1=document.getElementById('c-sales');
    if(c1){
      // Normalize EPS to same scale for visual display (multiply by shares to get $ millions)
      const aEPSnorm=aEPS.map(v=>v*co.shares);
      charts.s=new Chart(c1,{type:'line',data:{labels:aY,
        datasets:[
          {label:'Ventas ($M)',data:aS,borderColor:'#2563eb',backgroundColor:'#2563eb14',fill:true,tension:.35,pointRadius:3,borderWidth:2.5,yAxisID:'y'},
          {label:'FCF ($M)',data:aF,borderColor:'#16a34a',backgroundColor:'#16a34a0e',fill:true,tension:.35,pointRadius:3,borderWidth:2,yAxisID:'y'},
          {label:'EPS × Acc. ($M)',data:aEPSnorm,borderColor:'#d97706',borderDash:[6,3],tension:.35,pointRadius:3,borderWidth:2,yAxisID:'y',backgroundColor:'transparent'}
        ]},
        options:{...base,
          plugins:{legend:{display:true,labels:{color:tc,font:{size:11},boxWidth:10,padding:14}}},
          scales:{
            x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
            y:{type:'logarithmic',grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>{if(v>=1000000)return'$'+(v/1000000).toFixed(0)+'B';if(v>=1000)return'$'+(v/1000).toFixed(0)+'K';return'$'+v;}}}
          }
        }
      });
    }

    // Chart 2: Márgenes — EBITDA, EBIT, FCF
    const c2=document.getElementById('c-mg');
    if(c2) charts.mg=new Chart(c2,{type:'line',data:{labels:co.years,
      datasets:[
        {label:'EBITDA %',data:co.ebitdaM,borderColor:'#b45309',tension:.35,pointRadius:3,borderWidth:2.5},
        {label:'EBIT %',data:co.ebitM,borderColor:'#d97706',tension:.35,pointRadius:3,borderWidth:2,borderDash:[4,2]},
        {label:'FCF %',data:co.fcfM,borderColor:'#16a34a',tension:.35,pointRadius:3,borderWidth:2,borderDash:[7,3]}
      ]},
      options:{...base,
        plugins:{legend:{display:true,labels:{color:tc,font:{size:11},boxWidth:10}}},
        scales:{
          x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
          y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+'%'}}
        }
      }
    });

    // Chart 3: ROIC vs WACC bar chart with color coding
    const c3=document.getElementById('c-roic');
    if(c3){
      const roicColors=co.roic.map(v=>v>=co.wacc?'#16a34a80':'#dc262680');
      const roicBorderColors=co.roic.map(v=>v>=co.wacc?'#16a34a':'#dc2626');
      charts.roic=new Chart(c3,{type:'bar',data:{labels:co.years,
        datasets:[
          {label:'ROIC %',data:co.roic,backgroundColor:roicColors,borderColor:roicBorderColors,borderWidth:2,borderRadius:5},
          {label:`WACC ${co.wacc}%`,data:Array(co.years.length).fill(co.wacc),type:'line',borderColor:'#1e3a5f',borderWidth:2,borderDash:[5,3],pointRadius:0,fill:false}
        ]},
        options:{...base,
          plugins:{legend:{display:true,labels:{color:tc,font:{size:11},boxWidth:10}}},
          scales:{
            x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
            y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+'%'},min:0}
          }
        }
      });
    }

    // Chart 4: Historical multiples EV/FCF and PER
    const c4=document.getElementById('c-mult');
    if(c4){
      charts.mult=new Chart(c4,{type:'line',data:{labels:co.years,
        datasets:[
          {label:'EV/FCF',data:co.hEvF,borderColor:'#b45309',tension:.35,pointRadius:3,borderWidth:2.5,spanGaps:false},
          {label:'PER',data:co.hPER,borderColor:'#7c3aed',tension:.35,pointRadius:3,borderWidth:2,borderDash:[5,3],spanGaps:false},
          {label:`Med. EV/FCF ${co.medEvFcf}x`,data:Array(co.years.length).fill(co.medEvFcf),borderColor:'#b45309',borderWidth:1,borderDash:[3,3],pointRadius:0},
          {label:`Med. PER ${co.medPER}x`,data:Array(co.years.length).fill(co.medPER),borderColor:'#7c3aed',borderWidth:1,borderDash:[3,3],pointRadius:0}
        ]},
        options:{...base,
          plugins:{legend:{display:true,labels:{color:tc,font:{size:11},boxWidth:10}}},
          scales:{
            x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
            y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>v+'x'}}
          }
        }
      });
    }
  }

  if(tab==='valoracion'){
    buildMultHistChart();
  }

  if(tab==='proyecciones'){
    const pts=co.pY.map((yr,i)=>{const f=(co.pF[i]*tEVF-co.pND[i])/co.shares,p=co.pEPS[i]*tPER,e=(co.pEB[i]*tEVE-co.pND[i])/co.shares;return{yr,avg:(f+p+e)/3,f,p};});
    const cp=document.getElementById('c-pt');
    if(cp) charts.pt=new Chart(cp,{type:'line',data:{labels:['Actual',...co.pY.map(String)],
      datasets:[
        {label:'Precio promedio',data:[price,...pts.map(p=>Math.round(p.avg))],borderColor:co.color,backgroundColor:co.color+'14',fill:true,tension:.35,pointRadius:5,borderWidth:3},
        {label:'EV/FCF',data:[price,...pts.map(p=>Math.round(p.f))],borderColor:'#b45309',tension:.35,borderDash:[5,3],pointRadius:3,borderWidth:1.5},
        {label:'PER',data:[price,...pts.map(p=>Math.round(p.p))],borderColor:'#7c3aed',tension:.35,borderDash:[5,3],pointRadius:3,borderWidth:1.5}
      ]},
      options:{...base,
        plugins:{legend:{display:true,labels:{color:tc,font:{size:11},boxWidth:10}}},
        scales:{
          x:{grid:{color:gc},ticks:{color:tc,font:{size:10}}},
          y:{grid:{color:gc},ticks:{color:tc,font:{size:10},callback:v=>'$'+N(v)}}
        }
      }
    });
  }
}

// AI HELPERS
// ═══════════════════════════════════════════════════════════════════
function fmtAI(t){
  return t.split('\n').map(l=>{
    if(l.startsWith('## '))return`<h3>${l.replace('## ','')}</h3>`;
    if(l.startsWith('# '))return`<h3 style="font-size:14px;">${l.replace('# ','')}</h3>`;
    if(l.startsWith('- ')||l.startsWith('• ')){
      const txt=l.replace(/^[-•] /,'');
      const has=t=>txt.includes(t);
      const bg2=has('🟢')?'#f0fdf4':has('🔴')?'#fef2f2':has('🟡')?'#fffbeb':'transparent';
      const bd2=has('🟢')?'1px solid #bbf7d0':has('🔴')?'1px solid #fecaca':has('🟡')?'1px solid #fde68a':'none';
      return`<div style="padding:${bg2!=='transparent'?'7px 11px':'2px 4px'};margin:3px 0;background:${bg2};border:${bd2};border-radius:6px;">${txt.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</div>`;
    }
    if(l.startsWith('**')&&l.endsWith('**'))return`<div style="font-weight:700;margin:4px 0;">${l.replace(/\*\*/g,'')}</div>`;
    if(l.trim()==='')return'<div style="height:5px"></div>';
    return`<p style="margin:3px 0;">${l.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')}</p>`;
  }).join('');
}
