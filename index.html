    example:(c)=>`${c.name}: PER actual ${(price/c.eps[9]).toFixed(1)}x (precio $${N(price,2)} / EPS $${N(c.eps[9],2)}). Mediana histórica: ${c.medPER}x. ${price/c.eps[9]<c.medPER?'Descuento del '+((1-price/c.eps[9]/c.medPER)*100).toFixed(0)+'% vs media.':'Prima del '+((price/c.eps[9]/c.medPER-1)*100).toFixed(0)+'% vs media.'}`,
    bench:[{v:'<15x',c:'#16a34a',bg:'#f0fdf4',label:'Barato'},{v:'15-30x',c:'#d97706',bg:'#fffbeb',label:'Razonable'},{v:'>50x',c:'#7c3aed',bg:'#f5f3ff',label:'Requiere mucho crecimiento'}],
    ref:'"The Intelligent Investor", Benjamin Graham (1949).'},
  evfcf:{emoji:'🏆',title:'EV/FCF — Enterprise Value / Free Cash Flow',color:'#b45309',tag:'VALORACIÓN',
    def:'El múltiplo rey para empresas de calidad. Mide cuántas veces el EV equivale al FCF anual. No se puede manipular con amortizaciones como el PER.',
    formula:'EV/FCF = Enterprise Value / Free Cash Flow\ndonde EV = Market Cap + Deuda Neta',
    example:(c)=>{const evfcf=Math.round((price*c.shares+c.netDebt[9])/c.fcf[9]);const diff=((evfcf-c.medEvFcf)/c.medEvFcf*100);return`${c.name}: EV/FCF actual ${evfcf}x vs mediana histórica ${c.medEvFcf}x. ${diff<0?'Descuento del '+Math.abs(diff).toFixed(0)+'% sobre su media histórica — atractivo.':'Prima del '+diff.toFixed(0)+'% sobre su media histórica.'}`},
    bench:[{v:'<15x',c:'#16a34a',bg:'#f0fdf4',label:'Muy barato'},{v:'15-25x',c:'#d97706',bg:'#fffbeb',label:'Razonable'},{v:'>40x',c:'#dc2626',bg:'#fef2f2',label:'Caro'}],
    ref:'"Quality Investing", Cunningham, Packer & Vinke (2016).'},
  evEbitda:{emoji:'📊',title:'EV/EBITDA',color:'#2563eb',tag:'VALORACIÓN',
    def:'Alternativa al PER para comparar empresas con distintas estructuras de capital. Muy usado en M&A. Normaliza diferencias contables entre países.',
    formula:'EV/EBITDA = Enterprise Value / EBITDA',
    example:(c)=>{const eveb=Math.round((price*c.shares+c.netDebt[9])/c.ebitda[9]);return`${c.name}: EV/EBITDA actual ${eveb}x vs mediana histórica ${c.medEvEbitda}x. EBITDA 2025: $${N(c.ebitda[9])}M (margen ${P(c.ebitdaM[9])}).`},
    bench:[{v:'<10x',c:'#16a34a',bg:'#f0fdf4',label:'Barato'},{v:'10-20x',c:'#d97706',bg:'#fffbeb',label:'Razonable'},{v:'>30x',c:'#dc2626',bg:'#fef2f2',label:'Caro'}],
    ref:'"Valuation", McKinsey & Company.'},
  dcf:{emoji:'📐',title:'DCF — Descuento de Flujos de Caja',color:'#2563eb',tag:'VALORACIÓN',
    def:'Calcula el valor presente de todos los flujos futuros. Un euro hoy vale más que un euro mañana. Traduce flujos futuros a valor de hoy.',
    formula:'Valor = Σ [FCF_n / (1+r)^n] + TV / (1+r)^10\nTV = FCF_10 × (1+g) / (r−g)',
    example:(c)=>`Si ${c.name} crece FCF al ${gr}% anual 10 años con tasa descuento ${dr}%, el valor intrínseco es ~$${N(calcDCF())} por acción (precio actual $${N(price)}).`,
    bench:[{v:'Crec >15%',c:'#16a34a',bg:'#f0fdf4',label:'Asume alto crecimiento'},{v:'Tasa 9-11%',c:'#d97706',bg:'#fffbeb',label:'Descuento razonable'}],
    ref:'John Burr Williams, "The Theory of Investment Value" (1938).'},
  margenSeg:{emoji:'🛡️',title:'Margen de Seguridad',color:'#16a34a',tag:'PRINCIPIO VALUE',
    def:'El concepto más importante del value investing. Diferencia entre valor intrínseco y precio pagado. Actúa como colchón contra errores de estimación.',
    formula:'MdS = (Valor Intrínseco − Precio) / Valor Intrínseco × 100\nRegla: comprar con ≥20-30% de descuento',
    example:(c)=>{const mult=calcMult();const ms=Math.min((calcDCF()-price)/price*100,(mult.avg-price)/price*100);return`${c.name} hoy: MdS ${ms.toFixed(1)}%. ${ms>20?'Precio atractivo con margen amplio.':ms>0?'Precio razonable, margen ajustado.':'Precio por encima del valor estimado — sin margen de seguridad.'}`},
    bench:[{v:'>30%',c:'#16a34a',bg:'#f0fdf4',label:'Amplio — ideal'},{v:'15-30%',c:'#d97706',bg:'#fffbeb',label:'Razonable'},{v:'<0%',c:'#dc2626',bg:'#fef2f2',label:'Sobrevalorado'}],
    ref:'"The Intelligent Investor", Capítulo 20. Graham: "El margen de seguridad hace innecesaria la predicción precisa."'},
  netDebt:{emoji:'🏦',title:'Deuda Neta',color:'#dc2626',tag:'BALANCE',
    def:'Deuda financiera total menos efectivo disponible. Negativo = más caja que deuda — "fortín financiero" que Buffett admira.',
    formula:'Deuda Neta = Deuda CP + LP − Efectivo\nRatio: Deuda Neta / EBITDA',
    example:(c)=>{const dd=(c.netDebt[9]/c.ebitda[9]);return`${c.name} 2025: Deuda Neta $${N(c.netDebt[9])}M → ${dd.toFixed(1)}x EBITDA. ${c.netDebt[9]<0?'Posición de CAJA NETA — balance excepcional.':dd<1?'Deuda muy manejable.':dd<2?'Cómodo — sin presión financiera.':'Vigilar.'}`},
    bench:[{v:'<0x (caja)',c:'#16a34a',bg:'#f0fdf4',label:'Fortín financiero'},{v:'0-2x',c:'#d97706',bg:'#fffbeb',label:'Cómodo'},{v:'>3x',c:'#dc2626',bg:'#fef2f2',label:'⚠️ Arriesgado'}],
    ref:'Buffett: "Me gustan los negocios que pueden prosperar sin deuda."'},
  cagr:{emoji:'📈',title:'CAGR — Tasa de Crecimiento Anual Compuesta',color:'#16a34a',tag:'CRECIMIENTO',
    def:'Tasa de crecimiento anual equivalente. Elimina la volatilidad año a año y permite comparar crecimientos de distintos períodos.',
    formula:'CAGR = (Valor Final / Valor Inicial) ^ (1/Años) − 1',
    example:(c)=>`${c.name} ventas: CAGR ${P(cagr(c.sales[9],c.sales[0],9))} en 9 años. FCF: CAGR ${P(cagr(c.fcf[9],c.fcf[0],9))}. EPS: CAGR ${P(cagr(c.eps[9],c.eps[0],9))}.`,
    bench:[{v:'>20%',c:'#16a34a',bg:'#f0fdf4',label:'Excepcional'},{v:'10-20%',c:'#d97706',bg:'#fffbeb',label:'Muy bueno'},{v:'<5%',c:'#dc2626',bg:'#fef2f2',label:'Por debajo inflación'}],
    ref:'"The Most Important Thing", Howard Marks (2011).'},
  wacc:{emoji:'⚖️',title:'WACC / Tasa de Descuento',color:'#2563eb',tag:'VALORACIÓN',
    def:'Coste medio ponderado del capital — rentabilidad mínima que debe generar la empresa. A mayor incertidumbre, mayor tasa exigida.',
    formula:'WACC = (E/V) × Re + (D/V) × Rd × (1−Tax)\nSimplificado: Rf + Prima riesgo × Beta',
    example:(c)=>`WACC asumido para ${c.name}: ~${c.wacc}%. ROIC actual ${P(c.roic[9])} → spread de ${(c.roic[9]-c.wacc).toFixed(1)}pp. ${c.roic[9]>c.wacc?'Crea valor económico.':'Destruye valor vs coste de capital.'}`,
    bench:[{v:'8-10%',c:'#16a34a',bg:'#f0fdf4',label:'Para compounders'},{v:'10-12%',c:'#d97706',bg:'#fffbeb',label:'Estándar'},{v:'>14%',c:'#dc2626',bg:'#fef2f2',label:'Alto riesgo'}],
    ref:'"Valuation", McKinsey & Company.'},
  capex:{emoji:'🔨',title:'CapEx — Capital Expenditure',color:'#d97706',tag:'FLUJO DE CAJA',
    def:'Inversión en activos físicos. Los mejores negocios para Buffett son los que generan mucho FCF con poco CapEx — "ligeros en activos".',
    formula:'FCF real = Flujo Operativo − CapEx de mantenimiento',
    example:(c)=>`${c.name}: CapEx/Ventas ${P(co.isD.cx[0])} — ${co.isD.cx[0]<3?'extraordinariamente ligero en activos':co.isD.cx[0]<7?'moderado':'capital intensivo'}. FCF margin resultante: ${P(c.fcfM[9])}.`,
    bench:[{v:'<3%',c:'#16a34a',bg:'#f0fdf4',label:'Ligero en activos'},{v:'3-8%',c:'#d97706',bg:'#fffbeb',label:'Moderado'},{v:'>12%',c:'#dc2626',bg:'#fef2f2',label:'Capital intensivo'}],
    ref:'Buffett Annual Letter 1992: "Los negocios maravillosos no requieren mucho capital para crecer."'},
  wc:{emoji:'🔄',title:'Working Capital (Capital Circulante)',color:'#0891b2',tag:'BALANCE',
    def:'WC negativo = clientes pagan ANTES de que la empresa incurra en costes. Ventaja financiera estructural enorme. La empresa crece con dinero ajeno.',
    formula:'WC = Activos Corrientes − Pasivos Corrientes\nΔWC positivo = consume caja | ΔWC negativo = genera caja',
    example:(c)=>`${c.name}: WC/Ventas ${P(co.isD.wc[0])}. ${co.isD.wc[0]<-10?'Los clientes financian el crecimiento — ventaja estructural excepcional.':co.isD.wc[0]<0?'WC ligeramente favorable.':'WC positivo — la empresa financia a sus clientes.'}`,
    bench:[{v:'WC negativo',c:'#16a34a',bg:'#f0fdf4',label:'Ventaja'},{v:'WC neutro',c:'#d97706',bg:'#fffbeb',label:'Normal'},{v:'WC muy positivo',c:'#dc2626',bg:'#fef2f2',label:'⚠️ Consume caja'}],
    ref:'"Competition Demystified", Greenwald & Kahn (2005).'},
  moat:{emoji:'🏰',title:'MOAT — Ventaja Competitiva Duradera',color:'#1e3a5f',tag:'ANÁLISIS CUALITATIVO',
    def:'Término acuñado por Buffett. Ventaja competitiva que protege los beneficios frente a la competencia. Los 5 tipos: intangibles, switching costs, network effects, escala, efficient scale.',
    formula:'No hay fórmula — es cualitativo.\n5 tipos según Morningstar: intangibles, switching, red, escala, efficient scale',
    example:(c)=>{const m=calcMoat();return`${c.name}: MOAT Score ${m.overall}/100 — ${m.label}. ROIC ${P(c.roic[9])} sostenido vs WACC ${c.wacc}% durante 10 años confirma ventaja real.`},
    bench:[{v:'MOAT >85',c:'#16a34a',bg:'#f0fdf4',label:'Excepcional'},{v:'70-84',c:'#0891b2',bg:'#f0fdfa',label:'Sólido'},{v:'<55',c:'#dc2626',bg:'#fef2f2',label:'Frágil'}],
    ref:'Buffett Annual Letter 1995. Libro: "The Little Book That Builds Wealth", Pat Dorsey.'},
  graham:{emoji:'📖',title:'Graham Number',color:'#5a5650',tag:'VALORACIÓN',
    def:'Fórmula conservadora de Benjamin Graham para el precio máximo razonable. Diseñada para proteger capital en empresas industriales de los años 40-50.',
    formula:'Graham Number = √(22.5 × EPS × Book Value por Acción)\n22.5 = 15 (PER máx Graham) × 1.5 (P/Book máx)',
    example:(c)=>{const gn=Math.sqrt(22.5*c.eps[9]*(c.equity/c.shares));return`${c.name} 2025: Graham Number ≈ $${N(gn,0)}. Cotiza a $${N(price,0)} = ${(price/gn).toFixed(1)}x Graham. ${price/gn>3?'Graham no contemplaba ROIC de '+P(c.roic[9])+' sin activos físicos.':'Precio cercano al valor Graham.'}`},
    bench:[{v:'Precio < Graham#',c:'#16a34a',bg:'#f0fdf4',label:'Ultra-conservador'},{v:'1-2x Graham#',c:'#d97706',bg:'#fffbeb',label:'Razonable'},{v:'>3x',c:'#7c3aed',bg:'#f5f3ff',label:'Solo con ROIC muy alto'}],
    ref:'"The Intelligent Investor", B. Graham (1949).'},
};

function showTip(id,el){
  const t=TIPS[id]; if(!t) return;
  document.getElementById('tip-emoji').textContent=t.emoji;
  document.getElementById('tip-title').textContent=t.title;
  const tag=document.getElementById('tip-tag');
  tag.textContent=t.tag; tag.style.background=t.color+'18'; tag.style.color=t.color;
  document.getElementById('tip-def').textContent=t.def;
  const fBox=document.getElementById('tip-formula');
  fBox.textContent=t.formula; fBox.style.background=t.color+'0e'; fBox.style.color=t.color;
  document.getElementById('tip-example').textContent=typeof t.example==='function'?t.example(co):t.example;
  const benchRow=document.getElementById('tip-bench-row');
  const benchEl=document.getElementById('tip-bench');
  if(t.bench){
    benchRow.style.display='block';
    benchEl.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:3px;">'+
      t.bench.map(b=>`<span style="padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:${b.bg};color:${b.c};">${b.v} — ${b.label}</span>`).join('')+'</div>';
  } else { benchRow.style.display='none'; }
  document.getElementById('tip-ref').textContent=t.ref;
  const box=document.getElementById('tip-box');
  box.style.display='block';
  const rect=el.getBoundingClientRect();
  const bw=320,bh=460;
  let top=rect.bottom+8,left=rect.left;
  if(top+bh>window.innerHeight) top=rect.top-bh-8;
  if(left+bw>window.innerWidth) left=window.innerWidth-bw-12;
  if(left<8) left=8;
  box.style.top=Math.max(8,top)+'px';
  box.style.left=left+'px';
  document.getElementById('tip-overlay').style.display='block';
}
function closeTip(){
  document.getElementById('tip-box').style.display='none';
  document.getElementById('tip-overlay').style.display='none';
}

function toggleAcCard(card){
  const expand=card.querySelector('.ac-expand');
  const arrow=card.querySelector('.ac-arrow');
  const isOpen=expand.classList.contains('open');
  document.querySelectorAll('.ac-expand.open').forEach(e=>e.classList.remove('open'));
  document.querySelectorAll('.ac-arrow').forEach(a=>a.style.transform='rotate(0deg)');
  if(!isOpen){expand.classList.add('open');arrow.style.transform='rotate(180deg)';}
}
function filterAc(filter,btn){
  document.querySelectorAll('.ac-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('#ac-grid .ac-card').forEach(card=>{
    card.style.display=(filter==='all'||card.dataset.section===filter)?'block':'none';
  });
}

function injectTips(){
  const el=document.getElementById('cnt');
  if(!el) return;
  el.querySelectorAll('[data-tip]').forEach(node=>{
    const id=node.dataset.tip;
    if(TIPS[id]) node.onclick=()=>showTip(id,node);
  });
}
